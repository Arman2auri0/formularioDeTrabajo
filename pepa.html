<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winie Poo 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a00;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Caveat', cursive;
    overflow: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 50%, #3d1a00 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, #2a0d00 0%, transparent 60%);
  }

  h1 {
    font-family: 'Permanent Marker', cursive;
    color: #ff6b35;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-shadow: 0 0 30px rgba(255,107,53,0.6), 3px 3px 0 #8b2500;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 30px rgba(255,107,53,0.6), 3px 3px 0 #8b2500; }
    50%      { text-shadow: 0 0 60px rgba(255,107,53,0.9), 3px 3px 0 #8b2500; }
  }

  .subtitle { color: #cc4400; font-size: 1.1rem; margin-bottom: 30px; opacity: 0.8; }

  .scene {
    width: 220px;
    height: 380px;
    perspective: 900px;
    perspective-origin: 50% 40%;
    cursor: grab;
    user-select: none;
  }
  .scene:active { cursor: grabbing; }

  .cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-20deg) rotateY(30deg);
  }

  .face {
    position: absolute;
    border-radius: 10px;
  }

  .front {
    width: 160px; height: 300px;
    left: 30px; top: 40px;
    background: linear-gradient(160deg,#f7ea50 0%,#e8d520 50%,#d4c010 100%);
    transform: translateZ(25px);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset -6px -6px 18px rgba(0,0,0,0.18), inset 3px 3px 8px rgba(255,255,255,0.35);
    overflow: hidden;
  }

  .back {
    width: 160px; height: 300px;
    left: 30px; top: 40px;
    background: linear-gradient(160deg,#f7ea50 0%,#e8d520 50%,#d4c010 100%);
    transform: rotateY(180deg) translateZ(25px);
    box-shadow: inset -4px -4px 14px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .right {
    width: 50px; height: 300px;
    left: 165px; top: 40px;
    background: linear-gradient(180deg,#b8a600 0%,#988800 100%);
    transform: rotateY(90deg) translateZ(25px) translateX(-25px);
    transform-origin: left center;
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.35);
  }

  .left {
    width: 50px; height: 300px;
    left: 30px; top: 40px;
    background: linear-gradient(180deg,#e0cc1a 0%,#c0ac00 100%);
    transform: rotateY(-90deg) translateZ(25px) translateX(25px);
    transform-origin: right center;
  }

  .top {
    width: 160px; height: 50px;
    left: 30px; top: 15px;
    background: linear-gradient(90deg,#111 0%,#2a2a2a 50%,#111 100%);
    transform: rotateX(90deg) translateZ(25px) translateY(25px);
    transform-origin: bottom center;
    border-radius: 8px 8px 0 0;
    box-shadow: inset 0 -3px 8px rgba(0,0,0,0.6);
  }

  .bottom {
    width: 160px; height: 50px;
    left: 30px; top: 315px;
    background: linear-gradient(90deg,#b8a600 0%,#9e8e00 100%);
    transform: rotateX(-90deg) translateZ(25px) translateY(-25px);
    transform-origin: top center;
    border-radius: 0 0 8px 8px;
  }

  .drawing-svg { width: 148px; height: 285px; }

  .controls {
    margin-top: 28px;
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    font-family: 'Permanent Marker', cursive;
    background: transparent;
    border: 2px solid #ff6b35;
    color: #ff6b35;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn:hover {
    background: #ff6b35; color: #1a0a00;
    box-shadow: 0 0 20px rgba(255,107,53,0.5);
    transform: translateY(-2px);
  }

  .hint {
    color: #664422; font-size: 1rem; margin-top: 14px; text-align: center;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity:0.4; } 50% { opacity:1; }
  }

  .particle {
    position: fixed; border-radius: 50%;
    background: #ff6b35; pointer-events: none;
    animation: particleFly linear infinite; opacity: 0;
  }
  @keyframes particleFly {
    0%   { transform: translateY(100vh) rotate(0deg);   opacity:0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-80px) rotate(720deg); opacity:0; }
  }

  @keyframes floatIdle {
    0%,100% { transform: rotateX(var(--rx)) rotateY(var(--ry)) translateY(0px); }
    50%      { transform: rotateX(var(--rx)) rotateY(var(--ry)) translateY(-14px); }
  }
  .cube.idle { animation: floatIdle 4s ease-in-out infinite; }

  @keyframes spinAnim {
    from { transform: rotateX(var(--rx)) rotateY(var(--ry)); }
    to   { transform: rotateX(var(--rx)) rotateY(calc(var(--ry) + 360deg)); }
  }
  .cube.spinning { animation: spinAnim 1s cubic-bezier(.4,0,.2,1) forwards; }

  @keyframes poseAnim {
    0%   { transform: rotateX(var(--rx)) rotateY(var(--ry)) scale(1); }
    15%  { transform: rotateX(calc(var(--rx) - 25deg)) rotateY(calc(var(--ry) + 20deg)) scale(1.12); }
    35%  { transform: rotateX(calc(var(--rx) + 20deg)) rotateY(calc(var(--ry) - 18deg)) scale(0.93); }
    55%  { transform: rotateX(calc(var(--rx) - 15deg)) rotateY(calc(var(--ry) + 30deg)) scale(1.08); }
    75%  { transform: rotateX(calc(var(--rx) + 10deg)) rotateY(calc(var(--ry) - 10deg)) scale(0.97); }
    100% { transform: rotateX(var(--rx)) rotateY(var(--ry)) scale(1); }
  }
  .cube.posing { animation: poseAnim 0.9s ease-in-out forwards; }

  @keyframes resetAnim {
    to { transform: rotateX(-20deg) rotateY(30deg); }
  }
  .cube.resetting { animation: resetAnim 0.6s cubic-bezier(.4,0,.2,1) forwards; }
</style>
</head>
<body>

<script>
  for(let i=0;i<14;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(3+Math.random()*5)+'s';
    p.style.animationDelay=(Math.random()*6)+'s';
    const s=(2+Math.random()*4)+'px';
    p.style.width=p.style.height=s;
    document.body.appendChild(p);
  }
</script>

<script>
  const cube  = document.getElementById('cube');
  const scene = document.getElementById('scene');

  let rotX = -20, rotY = 30;

  function setVars() {
    cube.style.setProperty('--rx', rotX + 'deg');
    cube.style.setProperty('--ry', rotY + 'deg');
  }

  function applyTransform() {
    cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  }

  function clearAnim(nextClass) {
    cube.className = 'cube';
    void cube.offsetWidth;
    setVars();
    if (nextClass) cube.classList.add(nextClass);
  }

  let dragging = false, sx, sy;

  scene.addEventListener('mousedown', e => {
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    clearAnim();
    applyTransform();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    rotY += (e.clientX - sx) * 0.55;
    rotX -= (e.clientY - sy) * 0.55;
    rotX = Math.max(-70, Math.min(70, rotX));
    applyTransform();
    sx = e.clientX; sy = e.clientY;
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    clearAnim('idle');
  });

  scene.addEventListener('touchstart', e => {
    dragging = true;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    clearAnim();
    applyTransform();
    e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    rotY += (e.touches[0].clientX - sx) * 0.55;
    rotX -= (e.touches[0].clientY - sy) * 0.55;
    rotX = Math.max(-70, Math.min(70, rotX));
    applyTransform();
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    clearAnim('idle');
  });

  document.getElementById('btnSpin').addEventListener('click', () => {
    clearAnim('spinning');
    cube.addEventListener('animationend', () => {
      rotY += 360;
      clearAnim('idle');
    }, { once: true });
  });

  document.getElementById('btnPose').addEventListener('click', () => {
    clearAnim('posing');
    cube.addEventListener('animationend', () => {
      clearAnim('idle');
    }, { once: true });
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    rotX = -20; rotY = 30;
    clearAnim('resetting');
    cube.addEventListener('animationend', () => {
      clearAnim('idle');
    }, { once: true });
  });
</script>
</body>
</html>
