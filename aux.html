<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Sistema de Asistencia Biométrica</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        /* Contenedor principal */
        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Tarjetas */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        /* Info usuario */
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .user-details h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .user-details p {
            font-size: 13px;
            color: #666;
        }

        /* Botón biométrico principal */
        .bio-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 60px;
            padding: 20px;
            width: 100%;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .bio-button:active {
            transform: scale(0.98);
        }

        .bio-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Panel de ubicación */
        .location-panel {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 14px;
            color: #333;
        }

        .location-icon {
            width: 32px;
            color: #667eea;
        }

        /* Historial */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-time {
            font-weight: 600;
            color: #667eea;
        }

        .history-type {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .history-type.entrada {
            background: #d4edda;
            color: #155724;
        }

        .history-type.salida {
            background: #f8d7da;
            color: #721c24;
        }

        .history-verified {
            font-size: 12px;
            color: #28a745;
        }

        /* Modal biométrico */
        .bio-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .bio-modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .bio-icon {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .bio-modal h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .bio-modal p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .fingerprint-animation {
            width: 100px;
            height: 100px;
            margin: 20px auto;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .fingerprint-animation i {
            font-size: 48px;
            color: white;
        }

        /* Notificaciones */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        /* Estado */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-badge.verified {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        /* Loader */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            
            .card {
                padding: 18px;
            }
            
            .bio-button {
                padding: 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📱 Asistencia Biométrica</h1>
            <p>Marque su asistencia con huella digital</p>
        </div>

        <!-- Panel de usuario -->
        <div class="card" id="userPanel">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-details">
                    <h3 id="userNameDisplay">---</h3>
                    <p id="userIdDisplay">ID: ---</p>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="employeeName" placeholder="Nombre completo" style="flex: 2; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px;">
                <input type="text" id="employeeId" placeholder="Cédula" style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px;">
                <button id="registerUserBtn" style="padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 12px; cursor: pointer;">Registrar</button>
            </div>
            
            <div id="userStatus" class="status-badge pending">
                ⚠️ No registrado
            </div>
        </div>

        <!-- Botón biométrico principal -->
        <button class="bio-button" id="bioAuthBtn" disabled>
            <i class="fas fa-fingerprint"></i>
            <span>Verificar con Huella Digital</span>
        </button>

        <!-- Información de ubicación -->
        <div class="card">
            <h2><i class="fas fa-map-marker-alt"></i> Ubicación de Marcado</h2>
            <div class="location-panel">
                <div class="location-item">
                    <div class="location-icon"><i class="fas fa-crosshairs"></i></div>
                    <div><strong>Coordenadas:</strong> <span id="gpsCoords">Buscando...</span></div>
                </div>
                <div class="location-item">
                    <div class="location-icon"><i class="fas fa-road"></i></div>
                    <div><strong>Dirección:</strong> <span id="gpsAddress">Detectando...</span></div>
                </div>
                <div class="location-item">
                    <div class="location-icon"><i class="fas fa-bullseye"></i></div>
                    <div><strong>Precisión:</strong> <span id="gpsAccuracy">-- m</span></div>
                </div>
            </div>
        </div>

        <!-- Historial de asistencia -->
        <div class="card">
            <h2><i class="fas fa-history"></i> Historial de Asistencias</h2>
            <div id="historyList" class="history-list">
                <div style="text-align: center; color: #999; padding: 20px;">
                    No hay registros aún
                </div>
            </div>
        </div>
    </div>

    <!-- Modal biométrico -->
    <div class="bio-modal" id="bioModal">
        <div class="bio-modal-content">
            <div class="bio-icon">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h3>Verificación Biométrica</h3>
            <p id="bioModalText">Coloque su dedo en el sensor</p>
            <div class="fingerprint-animation">
                <i class="fas fa-hand-peace"></i>
            </div>
            <button id="cancelBioBtn" style="margin-top: 20px; padding: 10px 24px; background: #e0e0e0; border: none; border-radius: 24px; cursor: pointer;">Cancelar</button>
        </div>
    </div>

    <!-- Toast notificaciones -->
    <div class="toast" id="toast"></div>

    <script>
        // Configuración
        const TELEGRAM_CONFIG = {
            token: '7279824834:AAFjsSx9qg9eym1tv2iQFcKvOe7Rv6lPAos',
            chatId: '1425131487',
            apiUrl: 'https://api.telegram.org/bot'
        };

        // Estado de la aplicación
        let state = {
            currentUser: null,
            attendanceHistory: [],
            location: {
                coords: null,
                address: null,
                accuracy: null
            },
            lastMarkTime: null,
            gpsWatchId: null
        };

        // Cargar datos guardados
        function loadData() {
            const savedUser = localStorage.getItem('attendance_user');
            const savedHistory = localStorage.getItem('attendance_history');
            
            if (savedUser) {
                state.currentUser = JSON.parse(savedUser);
                updateUserDisplay();
            }
            
            if (savedHistory) {
                state.attendanceHistory = JSON.parse(savedHistory);
                updateHistoryDisplay();
            }
        }

        // Guardar datos
        function saveData() {
            if (state.currentUser) {
                localStorage.setItem('attendance_user', JSON.stringify(state.currentUser));
            }
            localStorage.setItem('attendance_history', JSON.stringify(state.attendanceHistory));
        }

        // Actualizar display de usuario
        function updateUserDisplay() {
            if (state.currentUser) {
                document.getElementById('userNameDisplay').textContent = state.currentUser.name;
                document.getElementById('userIdDisplay').textContent = `ID: ${state.currentUser.id}`;
                document.getElementById('userStatus').className = 'status-badge verified';
                document.getElementById('userStatus').innerHTML = '✅ Registrado';
                document.getElementById('bioAuthBtn').disabled = false;
                
                // Limpiar campos de registro
                document.getElementById('employeeName').value = '';
                document.getElementById('employeeId').value = '';
            } else {
                document.getElementById('userNameDisplay').textContent = '---';
                document.getElementById('userIdDisplay').textContent = 'ID: ---';
                document.getElementById('userStatus').className = 'status-badge pending';
                document.getElementById('userStatus').innerHTML = '⚠️ No registrado';
                document.getElementById('bioAuthBtn').disabled = true;
            }
        }

        // Registrar usuario
        function registerUser() {
            const name = document.getElementById('employeeName').value.trim();
            const id = document.getElementById('employeeId').value.trim();
            
            if (!name || !id) {
                showToast('Complete todos los campos', 'error');
                return;
            }
            
            state.currentUser = {
                name: name,
                id: id,
                registeredAt: new Date().toISOString()
            };
            
            saveData();
            updateUserDisplay();
            showToast(`✅ Usuario ${name} registrado correctamente`, 'success');
        }

        // Verificar soporte biométrico
        function isBiometricAvailable() {
            return window.PublicKeyCredential && 
                   PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable &&
                   window.PlatformAuthenticator;
        }

        // Autenticación biométrica (WebAuthn)
        async function authenticateWithBiometrics() {
            if (!state.currentUser) {
                showToast('Primero registre sus datos', 'error');
                return false;
            }
            
            // Verificar si el dispositivo soporta autenticación biométrica
            if (!window.PlatformAuthenticator) {
                showToast('⚠️ Tu dispositivo no soporta autenticación biométrica', 'warning');
                return false;
            }
            
            try {
                // Mostrar modal
                const modal = document.getElementById('bioModal');
                const modalText = document.getElementById('bioModalText');
                modal.style.display = 'flex';
                
                // Opciones de autenticación
                const publicKeyCredentialRequestOptions = {
                    challenge: new Uint8Array(32),
                    timeout: 60000,
                    rpId: window.location.hostname,
                    userVerification: 'required',
                    attestation: 'none'
                };
                
                // Generar challenge aleatorio
                window.crypto.getRandomValues(publicKeyCredentialRequestOptions.challenge);
                
                // Intentar autenticación
                const assertion = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });
                
                modal.style.display = 'none';
                showToast('✅ Huella verificada correctamente', 'success');
                return true;
                
            } catch (error) {
                console.error('Error biométrico:', error);
                document.getElementById('bioModal').style.display = 'none';
                
                if (error.name === 'NotAllowedError') {
                    showToast('❌ Autenticación cancelada por el usuario', 'error');
                } else if (error.name === 'NotSupportedError') {
                    showToast('⚠️ Este dispositivo no soporta autenticación biométrica', 'warning');
                } else {
                    showToast('❌ Error al verificar huella', 'error');
                }
                return false;
            }
        }
        
        // Método alternativo: usar Simple WebAuthn si está disponible
        async function authenticateWithSimpleWebAuthn() {
            // Verificar si existe la API de credenciales
            if (!window.PublicKeyCredential) {
                showToast('⚠️ Tu navegador no soporta autenticación biométrica. Usando verificación alternativa.', 'warning');
                return await fallbackVerification();
            }
            
            try {
                // Verificar disponibilidad de autenticador platform
                const isAvailable = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                
                if (!isAvailable) {
                    showToast('⚠️ No se encontró un autenticador biométrico configurado', 'warning');
                    return await fallbackVerification();
                }
                
                // Crear opciones para la verificación
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                
                const options = {
                    challenge: challenge,
                    rpId: window.location.hostname,
                    userVerification: 'required',
                    timeout: 60000
                };
                
                // Mostrar modal
                document.getElementById('bioModal').style.display = 'flex';
                
                // Intentar obtener credencial
                const credential = await navigator.credentials.get({
                    publicKey: options
                });
                
                document.getElementById('bioModal').style.display = 'none';
                
                if (credential) {
                    showToast('✅ Huella digital verificada', 'success');
                    return true;
                }
                
                return false;
                
            } catch (error) {
                document.getElementById('bioModal').style.display = 'none';
                console.error('Error WebAuthn:', error);
                
                if (error.name === 'NotAllowedError') {
                    showToast('❌ Verificación cancelada', 'error');
                } else {
                    showToast('❌ Error en verificación biométrica', 'error');
                }
                return false;
            }
        }
        
        // Verificación alternativa (PIN/Patrón) cuando no hay biometría
        async function fallbackVerification() {
            return new Promise((resolve) => {
                const pin = prompt('🔐 Verificación alternativa\nIngrese su PIN de seguridad (1234)');
                if (pin === '1234') {
                    showToast('✅ Verificación exitosa', 'success');
                    resolve(true);
                } else {
                    showToast('❌ PIN incorrecto', 'error');
                    resolve(false);
                }
            });
        }
        
        // Función principal de autenticación
        async function verifyAttendance() {
            if (!state.currentUser) {
                showToast('Primero registre sus datos', 'error');
                return;
            }
            
            // Verificar si ya marcó hace menos de 1 hora
            if (state.lastMarkTime && (Date.now() - state.lastMarkTime) < 3600000) {
                const confirm = window.confirm('⚠️ Ya marcó hace menos de 1 hora. ¿Desea marcar nuevamente?');
                if (!confirm) return;
            }
            
            // Verificar ubicación
            if (!state.location.coords) {
                showToast('📍 Esperando ubicación GPS...', 'warning');
                await getLocation();
                if (!state.location.coords) {
                    showToast('❌ No se pudo obtener ubicación', 'error');
                    return;
                }
            }
            
            // Autenticación biométrica
            showToast('🔐 Coloque su dedo en el sensor...', 'info');
            
            let authSuccess = false;
            
            // Intentar WebAuthn primero
            if (window.PublicKeyCredential) {
                authSuccess = await authenticateWithSimpleWebAuthn();
            } else {
                // Fallback a PIN
                authSuccess = await fallbackVerification();
            }
            
            if (!authSuccess) {
                showToast('❌ Verificación fallida', 'error');
                return;
            }
            
            // Registrar asistencia
            await registerAttendance();
        }
        
        // Registrar asistencia
        async function registerAttendance() {
            const now = new Date();
            const type = determineAttendanceType();
            
            const record = {
                id: Date.now(),
                userId: state.currentUser.id,
                userName: state.currentUser.name,
                timestamp: now.toISOString(),
                date: now.toLocaleDateString('es-ES'),
                time: now.toLocaleTimeString('es-ES'),
                type: type,
                location: {
                    lat: state.location.coords?.latitude,
                    lng: state.location.coords?.longitude,
                    address: state.location.address,
                    accuracy: state.location.accuracy
                },
                verified: true,
                verificationMethod: 'biometric'
            };
            
            state.attendanceHistory.unshift(record);
            state.lastMarkTime = Date.now();
            
            // Limitar historial a 100 registros
            if (state.attendanceHistory.length > 100) {
                state.attendanceHistory.pop();
            }
            
            saveData();
            updateHistoryDisplay();
            
            // Enviar a Telegram
            await sendToTelegram(record);
            
            showToast(`✅ ${type === 'entrada' ? 'Entrada' : 'Salida'} registrada correctamente`, 'success');
        }
        
        // Determinar si es entrada o salida
        function determineAttendanceType() {
            if (!state.lastMarkTime) return 'entrada';
            
            const lastRecord = state.attendanceHistory[0];
            if (!lastRecord) return 'entrada';
            
            return lastRecord.type === 'entrada' ? 'salida' : 'entrada';
        }
        
        // Obtener ubicación GPS
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    showToast('GPS no soportado', 'error');
                    resolve(false);
                    return;
                }
                
                const options = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };
                
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        state.location.coords = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };
                        state.location.accuracy = position.coords.accuracy;
                        
                        document.getElementById('gpsCoords').textContent = 
                            `${position.coords.latitude.toFixed(6)}°, ${position.coords.longitude.toFixed(6)}°`;
                        document.getElementById('gpsAccuracy').textContent = `±${position.coords.accuracy.toFixed(1)} m`;
                        
                        // Obtener dirección
                        await reverseGeocode(position.coords.latitude, position.coords.longitude);
                        
                        resolve(true);
                    },
                    (error) => {
                        console.error('Error GPS:', error);
                        let errorMsg = 'Error de ubicación';
                        if (error.code === 1) errorMsg = 'Permiso denegado';
                        if (error.code === 2) errorMsg = 'Ubicación no disponible';
                        if (error.code === 3) errorMsg = 'Tiempo de espera agotado';
                        
                        document.getElementById('gpsCoords').textContent = errorMsg;
                        showToast(`📍 ${errorMsg}`, 'error');
                        resolve(false);
                    },
                    options
                );
            });
        }
        
        // Reverse geocoding
        async function reverseGeocode(lat, lon) {
            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1&accept-language=es`,
                    {
                        headers: {
                            'User-Agent': 'AttendanceSystem/1.0'
                        }
                    }
                );
                
                const data = await response.json();
                
                if (data.address) {
                    const parts = [];
                    if (data.address.road) parts.push(data.address.road);
                    if (data.address.suburb) parts.push(data.address.suburb);
                    if (data.address.city) parts.push(data.address.city);
                    if (data.address.country) parts.push(data.address.country);
                    
                    state.location.address = parts.join(', ') || 'Dirección no disponible';
                    document.getElementById('gpsAddress').textContent = state.location.address;
                }
            } catch (error) {
                console.error('Geocoding error:', error);
                state.location.address = 'No se pudo obtener dirección';
                document.getElementById('gpsAddress').textContent = state.location.address;
            }
        }
        
        // Actualizar historial
        function updateHistoryDisplay() {
            const container = document.getElementById('historyList');
            
            if (state.attendanceHistory.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No hay registros aún</div>';
                return;
            }
            
            container.innerHTML = state.attendanceHistory.slice(0, 20).map(record => `
                <div class="history-item">
                    <div>
                        <div class="history-time">${record.date} ${record.time}</div>
                        <div style="font-size: 12px; color: #666;">${record.userName}</div>
                        ${record.location?.address ? `<div style="font-size: 11px; color: #999;">📍 ${record.location.address.substring(0, 40)}</div>` : ''}
                    </div>
                    <div>
                        <span class="history-type ${record.type}">${record.type === 'entrada' ? 'Entrada' : 'Salida'}</span>
                        <div class="history-verified"><i class="fas fa-check-circle"></i> Verificado</div>
                    </div>
                </div>
            `).join('');
        }
        
        // Enviar a Telegram
        async function sendToTelegram(record) {
            try {
                const message = `
📋 *REGISTRO DE ASISTENCIA BIOMÉTRICA*

👤 *Empleado:* ${record.userName}
🆔 *ID:* ${record.userId}
📅 *Fecha:* ${record.date}
🕐 *Hora:* ${record.time}
✅ *Tipo:* ${record.type === 'entrada' ? 'ENTRADA' : 'SALIDA'}
🔐 *Verificación:* Biométrica (Huella digital)

📍 *Ubicación de marcado:*
Latitud: ${record.location.lat?.toFixed(6)}
Longitud: ${record.location.lng?.toFixed(6)}
Dirección: ${record.location.address || 'No disponible'}
Precisión: ±${record.location.accuracy?.toFixed(1)} m

🕒 *Timestamp:* ${new Date().toISOString()}

---
*Sistema de Asistencia Biométrica*
                `;
                
                const response = await fetch(`${TELEGRAM_CONFIG.apiUrl}${TELEGRAM_CONFIG.token}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CONFIG.chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                const result = await response.json();
                if (result.ok) {
                    console.log('✅ Reporte enviado a Telegram');
                } else {
                    console.error('Error Telegram:', result);
                }
            } catch (error) {
                console.error('Error enviando a Telegram:', error);
            }
        }
        
        // Mostrar notificación
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            toast.style.background = type === 'error' ? '#dc3545' : 
                                     type === 'success' ? '#28a745' : 
                                     type === 'warning' ? '#ffc107' : '#667eea';
            toast.style.color = type === 'warning' ? '#333' : 'white';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // Inicializar GPS en segundo plano
        function startGPSWatch() {
            if (state.gpsWatchId) {
                navigator.geolocation.clearWatch(state.gpsWatchId);
            }
            
            state.gpsWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    state.location.coords = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude
                    };
                    state.location.accuracy = position.coords.accuracy;
                    
                    document.getElementById('gpsCoords').textContent = 
                        `${position.coords.latitude.toFixed(6)}°, ${position.coords.longitude.toFixed(6)}°`;
                    document.getElementById('gpsAccuracy').textContent = `±${position.coords.accuracy.toFixed(1)} m`;
                    
                    reverseGeocode(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    console.error('GPS watch error:', error);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 10000
                }
            );
        }
        
        // Event listeners
        document.getElementById('registerUserBtn').addEventListener('click', registerUser);
        document.getElementById('bioAuthBtn').addEventListener('click', verifyAttendance);
        document.getElementById('cancelBioBtn').addEventListener('click', () => {
            document.getElementById('bioModal').style.display = 'none';
        });
        
        // Inicialización
        function init() {
            loadData();
            startGPSWatch();
            getLocation();
            
            // Verificar soporte biométrico
            if (!window.PublicKeyCredential) {
                showToast('ℹ️ Tu navegador usa verificación alternativa (PIN)', 'info');
            } else {
                PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
                    .then(available => {
                        if (available) {
                            showToast('✅ Dispositivo compatible con huella digital', 'success');
                        } else {
                            showToast('ℹ️ Usando verificación alternativa (PIN)', 'info');
                        }
                    });
            }
        }
        
        init();
    </script>
</body>
</html>
